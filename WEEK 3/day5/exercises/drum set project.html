<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JS Drum Set</title>
    <style>
        body {
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .keys {
            display: flex;
            gap: 15px;
        }

        .key {
            border: 4px solid #efefef;
            border-radius: 5px;
            padding: 1rem .5rem;
            transition: all .07s ease;
            width: 80px;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.4);
            cursor: pointer;
            user-select: none;
        }

        /* Animation when key is pressed */
        .playing {
            transform: scale(1.1);
            border-color: #ffc600;
            box-shadow: 0 0 10px #ffc600;
        }

        kbd {
            display: block;
            font-size: 30px;
            font-weight: bold;
        }

        .sound {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffc600;
        }
    </style>
</head>
<body>

    <div class="keys">
        <div data-key="65" class="key"><kbd>A</kbd><span class="sound">clap</span></div>
        <div data-key="83" class="key"><kbd>S</kbd><span class="sound">hihat</span></div>
        <div data-key="68" class="key"><kbd>D</kbd><span class="sound">kick</span></div>
        <div data-key="70" class="key"><kbd>F</kbd><span class="sound">openhat</span></div>
        <div data-key="71" class="key"><kbd>G</kbd><span class="sound">boom</span></div>
        <div data-key="72" class="key"><kbd>H</kbd><span class="sound">ride</span></div>
        <div data-key="74" class="key"><kbd>J</kbd><span class="sound">snare</span></div>
        <div data-key="75" class="key"><kbd>K</kbd><span class="sound">tom</span></div>
        <div data-key="76" class="key"><kbd>L</kbd><span class="sound">tink</span></div>
    </div>

    <audio data-key="65" src="sounds/clap.wav"></audio>
    <audio data-key="83" src="sounds/hihat.wav"></audio>
    <audio data-key="68" src="sounds/kick.wav"></audio>
    <audio data-key="70" src="sounds/openhat.wav"></audio>
    <audio data-key="71" src="sounds/boom.wav"></audio>
    <audio data-key="72" src="sounds/ride.wav"></audio>
    <audio data-key="74" src="sounds/snare.wav"></audio>
    <audio data-key="75" src="sounds/tom.wav"></audio>
    <audio data-key="76" src="sounds/tink.wav"></audio>

<script>
    function playSound(e) {
        // Detect if it's a keyboard event (e.keyCode) or a click (this.dataset.key)
        const keyCode = e.keyCode || this.getAttribute('data-key');
        
        const audio = document.querySelector(`audio[data-key="${keyCode}"]`);
        const key = document.querySelector(`.key[data-key="${keyCode}"]`);

        if (!audio) return; // Stop the function if no audio matches

        audio.currentTime = 0; // Rewind to start so we can hit it repeatedly
        audio.play();

        key.classList.add('playing');
    }

    function removeTransition(e) {
        if (e.propertyName !== 'transform') return; // Skip if it's not a transform
        this.classList.remove('playing');
    }

    // 1. Listen for Keyboard Events
    window.addEventListener('keydown', playSound);

    // 2. Listen for Mouse Clicks
    const keys = document.querySelectorAll('.key');
    keys.forEach(key => {
        key.addEventListener('click', playSound);
        // Remove the "playing" class once the CSS transition ends
        key.addEventListener('transitionend', removeTransition);
    });
</script>

</body>
</html>
