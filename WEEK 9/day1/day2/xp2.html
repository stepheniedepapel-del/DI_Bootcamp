<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Authentication with Redux Toolkit</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Redux Toolkit (UMD) -->
    <script src="https://unpkg.com/@reduxjs/toolkit@1.9.5/dist/redux-toolkit.umd.js"></script>
    <script src="https://unpkg.com/react-redux@8.1.3/dist/react-redux.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4338ca 100%);
            min-height: 100vh;
        }
        
        .auth-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }
        
        .slide-in {
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .scale-in {
            animation: scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        
        .input-group:focus-within label {
            color: #4f46e5;
        }
        
        .input-group:focus-within input {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        .spinner {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .protected-fade {
            animation: protectedFade 0.5s ease-out;
        }
        
        @keyframes protectedFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .toast {
            animation: toastSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes toastSlide {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .password-strength-bar {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { Provider, useSelector, useDispatch } = ReactRedux;
        const { configureStore, createSlice, createAsyncThunk } = window.RTK;
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // MOCK AUTHENTICATION SERVICE
        // ==========================================
        const MockAuthService = {
            DB_KEY: 'rtk_auth_db_v1',
            SESSION_KEY: 'rtk_auth_session',
            
            getDB() {
                const raw = localStorage.getItem(this.DB_KEY);
                return raw ? JSON.parse(raw) : { users: [] };
            },
            
            saveDB(db) {
                localStorage.setItem(this.DB_KEY, JSON.stringify(db));
            },
            
            hashPassword(password) {
                let hash = 0;
                for (let i = 0; i < password.length; i++) {
                    const char = password.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                return 'hash_' + Math.abs(hash).toString(16);
            },
            
            delay(ms = 800) {
                return new Promise(resolve => setTimeout(resolve, ms));
            },
            
            async register(username, email, password) {
                await this.delay();
                const db = this.getDB();
                
                if (!username || username.length < 3) {
                    throw new Error('Username must be at least 3 characters');
                }
                if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    throw new Error('Please enter a valid email address');
                }
                if (!password || password.length < 6) {
                    throw new Error('Password must be at least 6 characters');
                }
                
                if (db.users.find(u => u.email.toLowerCase() === email.toLowerCase())) {
                    throw new Error('An account with this email already exists');
                }
                if (db.users.find(u => u.username.toLowerCase() === username.toLowerCase())) {
                    throw new Error('Username is already taken');
                }
                
                const user = {
                    id: 'user_' + Date.now(),
                    username,
                    email: email.toLowerCase(),
                    passwordHash: this.hashPassword(password),
                    createdAt: new Date().toISOString(),
                    avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${username}`
                };
                
                db.users.push(user);
                this.saveDB(db);
                
                const { passwordHash, ...safeUser } = user;
                return { user: safeUser, token: 'token_' + Date.now() + '_' + Math.random().toString(36).substr(2) };
            },
            
            async login(email, password) {
                await this.delay();
                const db = this.getDB();
                
                if (!email || !password) {
                    throw new Error('Please fill in all fields');
                }
                
                const user = db.users.find(u => u.email.toLowerCase() === email.toLowerCase());
                if (!user) {
                    throw new Error('No account found with this email');
                }
                
                if (user.passwordHash !== this.hashPassword(password)) {
                    throw new Error('Incorrect password');
                }
                
                const { passwordHash, ...safeUser } = user;
                return { user: safeUser, token: 'token_' + Date.now() + '_' + Math.random().toString(36).substr(2) };
            },
            
            async logout() {
                await this.delay(300);
                localStorage.removeItem(this.SESSION_KEY);
                return true;
            },
            
            saveSession(session) {
                localStorage.setItem(this.SESSION_KEY, JSON.stringify({
                    ...session,
                    createdAt: new Date().toISOString()
                }));
            },
            
            getSession() {
                const raw = localStorage.getItem(this.SESSION_KEY);
                if (!raw) return null;
                const session = JSON.parse(raw);
                const age = Date.now() - new Date(session.createdAt).getTime();
                if (age > 7 * 24 * 60 * 60 * 1000) {
                    localStorage.removeItem(this.SESSION_KEY);
                    return null;
                }
                return session;
            }
        };

        // ==========================================
        // STEP 1: CREATE AUTH SLICE WITH REDUX TOOLKIT
        // ==========================================
        
        // Async thunks for async operations
        const loginUserThunk = createAsyncThunk(
            'auth/login',
            async ({ email, password }, { rejectWithValue }) => {
                try {
                    const result = await MockAuthService.login(email, password);
                    MockAuthService.saveSession(result);
                    return result;
                } catch (error) {
                    return rejectWithValue(error.message);
                }
            }
        );

        const registerUserThunk = createAsyncThunk(
            'auth/register',
            async ({ username, email, password }, { rejectWithValue }) => {
                try {
                    const result = await MockAuthService.register(username, email, password);
                    MockAuthService.saveSession(result);
                    return result;
                } catch (error) {
                    return rejectWithValue(error.message);
                }
            }
        );

        const logoutUserThunk = createAsyncThunk(
            'auth/logout',
            async () => {
                await MockAuthService.logout();
                return true;
            }
        );

        // Auth Slice using createSlice
        const authSlice = createSlice({
            name: 'auth',
            initialState: {
                user: null,
                token: null,
                isAuthenticated: false,
                isLoading: false,
                error: null
            },
            reducers: {
                // Synchronous reducers
                setUser: (state, action) => {
                    state.user = action.payload.user;
                    state.token = action.payload.token;
                    state.isAuthenticated = true;
                    state.error = null;
                },
                
                clearError: (state) => {
                    state.error = null;
                },
                
                restoreSession: (state, action) => {
                    state.user = action.payload.user;
                    state.token = action.payload.token;
                    state.isAuthenticated = true;
                }
            },
            extraReducers: (builder) => {
                // Login async handlers
                builder
                    .addCase(loginUserThunk.pending, (state) => {
                        state.isLoading = true;
                        state.error = null;
                    })
                    .addCase(loginUserThunk.fulfilled, (state, action) => {
                        state.isLoading = false;
                        state.user = action.payload.user;
                        state.token = action.payload.token;
                        state.isAuthenticated = true;
                    })
                    .addCase(loginUserThunk.rejected, (state, action) => {
                        state.isLoading = false;
                        state.error = action.payload;
                    })
                
                // Register async handlers
                    .addCase(registerUserThunk.pending, (state) => {
                        state.isLoading = true;
                        state.error = null;
                    })
                    .addCase(registerUserThunk.fulfilled, (state, action) => {
                        state.isLoading = false;
                        state.user = action.payload.user;
                        state.token = action.payload.token;
                        state.isAuthenticated = true;
                    })
                    .addCase(registerUserThunk.rejected, (state, action) => {
                        state.isLoading = false;
                        state.error = action.payload;
                    })
                
                // Logout async handlers
                    .addCase(logoutUserThunk.fulfilled, (state) => {
                        state.user = null;
                        state.token = null;
                        state.isAuthenticated = false;
                        state.error = null;
                    });
            }
        });

        const { setUser, clearError, restoreSession } = authSlice.actions;

        // ==========================================
        // STEP 2: CONFIGURE REDUX STORE
        // ==========================================
        
        const store = configureStore({
            reducer: {
                auth: authSlice.reducer
            },
            devTools: true
        });

        // ==========================================
        // UI COMPONENTS
        // ==========================================

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 4000);
                return () => clearTimeout(timer);
            }, [onClose]);

            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };

            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                info: 'bg-blue-500'
            };

            return (
                <div className={`toast fixed top-4 right-4 z-50 flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg text-white ${colors[type]} min-w-[300px]`}>
                    <i className={`fas ${icons[type]} text-lg`}></i>
                    <span className="text-sm font-medium flex-1">{message}</span>
                    <button onClick={onClose} className="opacity-70 hover:opacity-100">
                        <i className="fas fa-times"></i>
                    </button>
                </div>
            );
        };

        // ==========================================
        // STEP 3: AUTH COMPONENTS
        // ==========================================

        const LoginForm = ({ onSwitch }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [localError, setLocalError] = useState('');
            
            // useSelector: Access auth state from Redux store
            const { isLoading, error } = useSelector(state => state.auth);
            
            // useDispatch: Get dispatch function
            const dispatch = useDispatch();

            useEffect(() => {
                if (error) {
                    const timer = setTimeout(() => dispatch(clearError()), 5000);
                    return () => clearTimeout(timer);
                }
            }, [error, dispatch]);

            const handleSubmit = (e) => {
                e.preventDefault();
                setLocalError('');
                
                if (!email.trim() || !password) {
                    setLocalError('Please fill in all fields');
                    return;
                }
                
                // Dispatch async thunk for login
                dispatch(loginUserThunk({ email: email.trim(), password }));
            };

            return (
                <div className="w-full max-w-md slide-in">
                    <div className="text-center mb-8">
                        <div className="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-4 backdrop-blur-sm">
                            <i className="fas fa-shield-alt text-3xl text-white"></i>
                        </div>
                        <h2 className="text-3xl font-bold text-white mb-2">Welcome Back</h2>
                        <p className="text-indigo-200">Sign in to your account</p>
                    </div>

                    <form onSubmit={handleSubmit} className="space-y-4">
                        {(error || localError) && (
                            <div className="bg-red-500/20 border border-red-400/30 rounded-xl p-3 flex items-center gap-3 text-red-100 text-sm shake">
                                <i className="fas fa-exclamation-circle"></i>
                                {error || localError}
                            </div>
                        )}

                        <div className="input-group">
                            <label className="block text-sm font-medium text-indigo-200 mb-1.5 ml-1">Email Address</label>
                            <div className="relative">
                                <i className="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                <input
                                    type="email"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    placeholder="you@example.com"
                                    className="w-full pl-11 pr-4 py-3.5 bg-white/10 border-2 border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none transition-all"
                                    disabled={isLoading}
                                />
                            </div>
                        </div>

                        <div className="input-group">
                            <label className="block text-sm font-medium text-indigo-200 mb-1.5 ml-1">Password</label>
                            <div className="relative">
                                <i className="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                <input
                                    type={showPassword ? 'text' : 'password'}
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    placeholder="Enter your password"
                                    className="w-full pl-11 pr-12 py-3.5 bg-white/10 border-2 border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none transition-all"
                                    disabled={isLoading}
                                />
                                <button
                                    type="button"
                                    onClick={() => setShowPassword(!showPassword)}
                                    className="absolute right-4 top-1/2 -translate-y-1/2 text-white/50 hover:text-white transition-colors"
                                >
                                    <i className={`fas ${showPassword ? 'fa-eye-slash' : 'fa-eye'}`}></i>
                                </button>
                            </div>
                        </div>

                        <button
                            type="submit"
                            disabled={isLoading}
                            className="w-full py-3.5 bg-white text-indigo-600 rounded-xl font-bold text-lg hover:bg-indigo-50 transition-all shadow-lg hover:shadow-xl disabled:opacity-70 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                        >
                            {isLoading ? (
                                <>
                                    <i className="fas fa-circle-notch spinner"></i>
                                    Signing in...
                                </>
                            ) : (
                                <>
                                    Sign In
                                    <i className="fas fa-arrow-right"></i>
                                </>
                            )}
                        </button>
                    </form>

                    <p className="text-center text-indigo-200 mt-6 text-sm">
                        Don't have an account?{' '}
                        <button onClick={onSwitch} className="text-white font-semibold hover:underline">
                            Create one
                        </button>
                    </p>
                </div>
            );
        };

        const RegisterForm = ({ onSwitch }) => {
            const [username, setUsername] = useState('');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [confirmPassword, setConfirmPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [localError, setLocalError] = useState('');
            const [passwordStrength, setPasswordStrength] = useState(0);
            
            // useSelector: Access auth state
            const { isLoading, error } = useSelector(state => state.auth);
            const dispatch = useDispatch();

            useEffect(() => {
                if (error) {
                    const timer = setTimeout(() => dispatch(clearError()), 5000);
                    return () => clearTimeout(timer);
                }
            }, [error, dispatch]);

            const calculateStrength = (pwd) => {
                let score = 0;
                if (pwd.length >= 6) score++;
                if (pwd.length >= 10) score++;
                if (/[A-Z]/.test(pwd)) score++;
                if (/[0-9]/.test(pwd)) score++;
                if (/[^A-Za-z0-9]/.test(pwd)) score++;
                return score;
            };

            const handlePasswordChange = (e) => {
                const val = e.target.value;
                setPassword(val);
                setPasswordStrength(calculateStrength(val));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                setLocalError('');

                if (!username.trim() || !email.trim() || !password) {
                    setLocalError('Please fill in all fields');
                    return;
                }
                if (password !== confirmPassword) {
                    setLocalError('Passwords do not match');
                    return;
                }
                
                // Dispatch async thunk for registration
                dispatch(registerUserThunk({ username: username.trim(), email: email.trim(), password }));
            };

            const strengthColors = ['bg-gray-200', 'bg-red-400', 'bg-orange-400', 'bg-yellow-400', 'bg-green-400', 'bg-emerald-500'];
            const strengthLabels = ['', 'Weak', 'Fair', 'Good', 'Strong', 'Very Strong'];

            return (
                <div className="w-full max-w-md slide-in">
                    <div className="text-center mb-8">
                        <div className="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-4 backdrop-blur-sm">
                            <i className="fas fa-user-plus text-3xl text-white"></i>
                        </div>
                        <h2 className="text-3xl font-bold text-white mb-2">Create Account</h2>
                        <p className="text-indigo-200">Join us today</p>
                    </div>

                    <form onSubmit={handleSubmit} className="space-y-4">
                        {(error || localError) && (
                            <div className="bg-red-500/20 border border-red-400/30 rounded-xl p-3 flex items-center gap-3 text-red-100 text-sm shake">
                                <i className="fas fa-exclamation-circle"></i>
                                {error || localError}
                            </div>
                        )}

                        <div className="input-group">
                            <label className="block text-sm font-medium text-indigo-200 mb-1.5 ml-1">Username</label>
                            <div className="relative">
                                <i className="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                <input
                                    type="text"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    placeholder="johndoe"
                                    className="w-full pl-11 pr-4 py-3 bg-white/10 border-2 border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none transition-all"
                                    disabled={isLoading}
                                    maxLength={20}
                                />
                            </div>
                        </div>

                        <div className="input-group">
                            <label className="block text-sm font-medium text-indigo-200 mb-1.5 ml-1">Email Address</label>
                            <div className="relative">
                                <i className="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                <input
                                    type="email"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    placeholder="you@example.com"
                                    className="w-full pl-11 pr-4 py-3 bg-white/10 border-2 border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none transition-all"
                                    disabled={isLoading}
                                />
                            </div>
                        </div>

                        <div className="input-group">
                            <label className="block text-sm font-medium text-indigo-200 mb-1.5 ml-1">Password</label>
                            <div className="relative">
                                <i className="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                <input
                                    type={showPassword ? 'text' : 'password'}
                                    value={password}
                                    onChange={handlePasswordChange}
                                    placeholder="Min 6 characters"
                                    className="w-full pl-11 pr-12 py-3 bg-white/10 border-2 border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none transition-all"
                                    disabled={isLoading}
                                />
                                <button
                                    type="button"
                                    onClick={() => setShowPassword(!showPassword)}
                                    className="absolute right-4 top-1/2 -translate-y-1/2 text-white/50 hover:text-white transition-colors"
                                >
                                    <i className={`fas ${showPassword ? 'fa-eye-slash' : 'fa-eye'}`}></i>
                                </button>
                            </div>
                            {password && (
                                <div className="mt-2">
                                    <div className="flex gap-1 mb-1">
                                        {[1,2,3,4,5].map(i => (
                                            <div key={i} className={`flex-1 h-1 rounded-full password-strength-bar ${i <= passwordStrength ? strengthColors[passwordStrength] : 'bg-white/20'}`}></div>
                                        ))}
                                    </div>
                                    <span className="text-xs text-indigo-200">{strengthLabels[passwordStrength]}</span>
                                </div>
                            )}
                        </div>

                        <div className="input-group">
                            <label className="block text-sm font-medium text-indigo-200 mb-1.5 ml-1">Confirm Password</label>
                            <div className="relative">
                                <i className="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                <input
                                    type="password"
                                    value={confirmPassword}
                                    onChange={(e) => setConfirmPassword(e.target.value)}
                                    placeholder="Repeat your password"
                                    className="w-full pl-11 pr-4 py-3 bg-white/10 border-2 border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none transition-all"
                                    disabled={isLoading}
                                />
                            </div>
                        </div>

                        <button
                            type="submit"
                            disabled={isLoading}
                            className="w-full py-3.5 bg-white text-indigo-600 rounded-xl font-bold text-lg hover:bg-indigo-50 transition-all shadow-lg hover:shadow-xl disabled:opacity-70 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                        >
                            {isLoading ? (
                                <>
                                    <i className="fas fa-circle-notch spinner"></i>
                                    Creating account...
                                </>
                            ) : (
                                <>
                                    Create Account
                                    <i className="fas fa-arrow-right"></i>
                                </>
                            )}
                        </button>
                    </form>

                    <p className="text-center text-indigo-200 mt-6 text-sm">
                        Already have an account?{' '}
                        <button onClick={onSwitch} className="text-white font-semibold hover:underline">
                            Sign in
                        </button>
                    </p>
                </div>
            );
        };

        // ==========================================
        // PROTECTED DASHBOARD (Authenticated Content)
        // ==========================================

        const Dashboard = () => {
            // useSelector: Access user data from auth state
            const { user } = useSelector(state => state.auth);
            const dispatch = useDispatch();
            const [showToast, setShowToast] = useState(false);

            const handleLogout = () => {
                dispatch(logoutUserThunk());
            };

            const currentHour = new Date().getHours();
            const greeting = currentHour < 12 ? 'Good morning' : currentHour < 18 ? 'Good afternoon' : 'Good evening';

            return (
                <div className="min-h-screen p-4 md:p-8 protected-fade">
                    <div className="max-w-4xl mx-auto">
                        {/* Header */}
                        <header className="flex items-center justify-between mb-8">
                            <div className="flex items-center gap-4">
                                <img 
                                    src={user?.avatar || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user?.username}`} 
                                    alt="avatar" 
                                    className="w-14 h-14 rounded-full bg-white shadow-md border-2 border-white"
                                />
                                <div>
                                    <h1 className="text-2xl font-bold text-white">{greeting}, {user?.username}!</h1>
                                    <p className="text-indigo-200 text-sm">You are successfully authenticated</p>
                                </div>
                            </div>
                            <button
                                onClick={handleLogout}
                                className="px-5 py-2.5 bg-white/10 hover:bg-white/20 text-white rounded-xl text-sm font-medium transition-all backdrop-blur-sm border border-white/20 flex items-center gap-2"
                            >
                                <i className="fas fa-sign-out-alt"></i>
                                Logout
                            </button>
                        </header>

                        {/* Dashboard Cards */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div className="bg-white/10 backdrop-blur-sm rounded-2xl p-6 border border-white/20">
                                <div className="w-12 h-12 bg-blue-500/20 rounded-xl flex items-center justify-center mb-4">
                                    <i className="fas fa-user-shield text-blue-300 text-xl"></i>
                                </div>
                                <h3 className="text-white font-bold text-lg mb-1">Authenticated</h3>
                                <p className="text-indigo-200 text-sm">Your session is active and secure</p>
                            </div>

                            <div className="bg-white/10 backdrop-blur-sm rounded-2xl p-6 border border-white/20">
                                <div className="w-12 h-12 bg-green-500/20 rounded-xl flex items-center justify-center mb-4">
                                    <i className="fas fa-envelope text-green-300 text-xl"></i>
                                </div>
                                <h3 className="text-white font-bold text-lg mb-1">{user?.email}</h3>
                                <p className="text-indigo-200 text-sm">Your registered email address</p>
                            </div>

                            <div className="bg-white/10 backdrop-blur-sm rounded-2xl p-6 border border-white/20">
                                <div className="w-12 h-12 bg-purple-500/20 rounded-xl flex items-center justify-center mb-4">
                                    <i className="fas fa-clock text-purple-300 text-xl"></i>
                                </div>
                                <h3 className="text-white font-bold text-lg mb-1">Session Active</h3>
                                <p className="text-indigo-200 text-sm">Persists across page refreshes</p>
                            </div>
                        </div>

                        {/* User Info Card */}
                        <div className="glass-panel rounded-3xl shadow-2xl p-6 md:p-8 mb-6">
                            <h2 className="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                                <i className="fas fa-id-card text-indigo-600"></i>
                                User Profile
                            </h2>
                            
                            <div className="space-y-4">
                                <div className="flex items-center gap-4 p-4 bg-gray-50 rounded-xl">
                                    <div className="w-10 h-10 bg-indigo-100 rounded-lg flex items-center justify-center">
                                        <i className="fas fa-user text-indigo-600"></i>
                                    </div>
                                    <div>
                                        <p className="text-xs text-gray-500 font-medium uppercase">Username</p>
                                        <p className="text-gray-800 font-semibold">{user?.username}</p>
                                    </div>
                                </div>

                                <div className="flex items-center gap-4 p-4 bg-gray-50 rounded-xl">
                                    <div className="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center">
                                        <i className="fas fa-envelope text-green-600"></i>
                                    </div>
                                    <div>
                                        <p className="text-xs text-gray-500 font-medium uppercase">Email</p>
                                        <p className="text-gray-800 font-semibold">{user?.email}</p>
                                    </div>
                                </div>

                                <div className="flex items-center gap-4 p-4 bg-gray-50 rounded-xl">
                                    <div className="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center">
                                        <i className="fas fa-key text-purple-600"></i>
                                    </div>
                                    <div>
                                        <p className="text-xs text-gray-500 font-medium uppercase">User ID</p>
                                        <p className="text-gray-800 font-semibold text-sm font-mono">{user?.id}</p>
                                    </div>
                                </div>

                                <div className="flex items-center gap-4 p-4 bg-gray-50 rounded-xl">
                                    <div className="w-10 h-10 bg-amber-100 rounded-lg flex items-center justify-center">
                                        <i className="fas fa-calendar text-amber-600"></i>
                                    </div>
                                    <div>
                                        <p className="text-xs text-gray-500 font-medium uppercase">Member Since</p>
                                        <p className="text-gray-800 font-semibold">
                                            {user?.createdAt ? new Date(user.createdAt).toLocaleDateString('en-US', { 
                                                year: 'numeric', month: 'long', day: 'numeric' 
                                            }) : 'N/A'}
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Actions */}
                        <div className="glass-panel rounded-3xl shadow-2xl p-6 md:p-8">
                            <h2 className="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                                <i className="fas fa-cogs text-indigo-600"></i>
                                Actions
                            </h2>
                            <div className="flex flex-wrap gap-3">
                                <button 
                                    onClick={() => setShowToast(true)}
                                    className="px-5 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-medium transition-all shadow-md flex items-center gap-2"
                                >
                                    <i className="fas fa-bell"></i>
                                    Test Notification
                                </button>
                                <button 
                                    onClick={() => window.location.reload()}
                                    className="px-5 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-medium transition-all flex items-center gap-2"
                                >
                                    <i className="fas fa-sync"></i>
                                    Test Persistence
                                </button>
                            </div>
                            <p className="text-sm text-gray-500 mt-4">
                                <i className="fas fa-info-circle mr-1"></i>
                                Try refreshing the page — your session is persisted in localStorage!
                            </p>
                        </div>
                    </div>

                    {showToast && (
                        <Toast 
                            message="Redux Toolkit authentication is working perfectly!" 
                            type="success" 
                            onClose={() => setShowToast(false)} 
                        />
                    )}
                </div>
            );
        };

        // ==========================================
        // MAIN APP WITH CONDITIONAL RENDERING
        // ==========================================

        const App = () => {
            const [isLogin, setIsLogin] = useState(true);
            const [showToast, setShowToast] = useState(null);
            
            // useSelector: Check authentication status
            const { isAuthenticated, isLoading } = useSelector(state => state.auth);
            const dispatch = useDispatch();

            // Check for existing session on mount
            useEffect(() => {
                const session = MockAuthService.getSession();
                if (session) {
                    dispatch(restoreSession(session));
                    setShowToast({ message: 'Welcome back! Session restored.', type: 'success' });
                }
            }, [dispatch]);

            // Show toast on auth state changes
            useEffect(() => {
                if (showToast) {
                    const timer = setTimeout(() => setShowToast(null), 4000);
                    return () => clearTimeout(timer);
                }
            }, [showToast]);

            return (
                <>
                    {showToast && (
                        <Toast 
                            message={showToast.message} 
                            type={showToast.type} 
                            onClose={() => setShowToast(null)} 
                        />
                    )}

                    {!isAuthenticated ? (
                        <div className="min-h-screen auth-bg flex items-center justify-center p-4">
                            <div className="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                                {/* Left Side - Branding */}
                                <div className="hidden lg:block text-white">
                                    <div className="mb-8">
                                        <i className="fas fa-shield-alt text-6xl mb-6 opacity-90"></i>
                                        <h1 className="text-5xl font-bold mb-4">SecureAuth</h1>
                                        <p className="text-xl text-indigo-100 leading-relaxed">
                                            Modern authentication built with<br/>
                                            Redux Toolkit & React Hooks
                                        </p>
                                    </div>
                                    <div className="space-y-4">
                                        <div className="flex items-center gap-4 bg-white/10 rounded-xl p-4 backdrop-blur-sm">
                                            <div className="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                                                <i className="fas fa-lock"></i>
                                            </div>
                                            <div>
                                                <h3 className="font-semibold">Redux Toolkit Slices</h3>
                                                <p className="text-sm text-indigo-200">createSlice with async thunks</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-4 bg-white/10 rounded-xl p-4 backdrop-blur-sm">
                                            <div className="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                                                <i className="fas fa-sync"></i>
                                            </div>
                                            <div>
                                                <h3 className="font-semibold">Session Persistence</h3>
                                                <p className="text-sm text-indigo-200">localStorage with auto-restore</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-4 bg-white/10 rounded-xl p-4 backdrop-blur-sm">
                                            <div className="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                                                <i className="fas fa-user-shield"></i>
                                            </div>
                                            <div>
                                                <h3 className="font-semibold">Protected Routes</h3>
                                                <p className="text-sm text-indigo-200">Conditional rendering based on auth state</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Right Side - Form */}
                                <div className="flex justify-center">
                                    {isLogin ? (
                                        <LoginForm onSwitch={() => setIsLogin(false)} />
                                    ) : (
                                        <RegisterForm onSwitch={() => setIsLogin(true)} />
                                    )}
                                </div>
                            </div>
                        </div>
                    ) : (
                        <Dashboard />
                    )}
                </>
            );
        };

        // ==========================================
        // RENDER WITH PROVIDER
        // ==========================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <Provider store={store}>
                <App />
            </Provider>
        );
    </script>
</body>
</html>
