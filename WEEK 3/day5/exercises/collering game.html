<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coloring Squares Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        #container {
            display: flex;
            gap: 20px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Sidebar for colors and clear button */
        #sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        #palette {
            display: grid;
            grid-template-columns: repeat(3, 30px);
            gap: 5px;
        }

        .color {
            width: 30px;
            height: 30px;
            border: 1px solid #ddd;
            cursor: pointer;
            border-radius: 4px;
        }

        #clear-btn {
            padding: 10px 15px;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
        }

        /* The Canvas Grid */
        #grid {
            display: grid;
            /* 60 columns of 15px each */
            grid-template-columns: repeat(60, 15px);
            /* 40 rows of 15px each */
            grid-template-rows: repeat(40, 15px);
            border: 1px solid #ccc;
            background-color: white;
        }

        .cell {
            width: 15px;
            height: 15px;
            border: 0.1px solid #f9f9f9;
        }
    </style>
</head>
<body>

    <h1>Coloring Squares</h1>

    <div id="container">
        <div id="sidebar">
            <button id="clear-btn">Clear</button>
            <div id="palette"></div>
        </div>
        <div id="grid"></div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const palette = document.getElementById('palette');
        const clearBtn = document.getElementById('clear-btn');
        
        let currentColor = 'black';
        let isDrawing = false;

        const colors = [
            'red', 'orangered', 'orange', 'yellow', 'yellowgreen', 'green', 
            'lightseagreen', 'cyan', 'skyblue', 'blue', 'darkblue', 'indigo', 
            'purple', 'magenta', 'pink', 'lightgray', 'gray', 'black', 'white'
        ];

        // 1. Create the Color Palette
        colors.forEach(color => {
            const div = document.createElement('div');
            div.classList.add('color');
            div.style.backgroundColor = color;
            div.addEventListener('click', () => {
                currentColor = color;
            });
            palette.appendChild(div);
        });

        // 2. Create the Drawing Grid (2400 squares)
        for (let i = 0; i < 2400; i++) {
            const cell = document.createElement('div');
            cell.classList.add('cell');

            // Mousedown: Start drawing and color the current square
            cell.addEventListener('mousedown', () => {
                isDrawing = true;
                cell.style.backgroundColor = currentColor;
            });

            // Mouseover: If we are "drawing" (mouse is down), color the square
            cell.addEventListener('mouseover', () => {
                if (isDrawing) {
                    cell.style.backgroundColor = currentColor;
                }
            });

            grid.appendChild(cell);
        }

        // 3. Stop drawing when the mouse is released anywhere on the window
        window.addEventListener('mouseup', () => {
            isDrawing = false;
        });

        // 4. Clear Button Logic
        clearBtn.addEventListener('click', () => {
            const allCells = document.querySelectorAll('.cell');
            allCells.forEach(cell => cell.style.backgroundColor = 'white');
        });
    </script>
</body>
</html>
