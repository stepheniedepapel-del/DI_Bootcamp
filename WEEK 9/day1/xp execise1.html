<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React-Redux Todo List</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Redux & React-Redux -->
    <script src="https://unpkg.com/redux@4.2.1/dist/redux.min.js"></script>
    <script src="https://unpkg.com/react-redux@8.1.3/dist/react-redux.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .todo-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .todo-item:hover {
            transform: translateX(4px);
        }
        
        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #9ca3af;
        }
        
        .checkbox-custom {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid #d1d5db;
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }
        
        .checkbox-custom:checked {
            background-color: #10b981;
            border-color: #10b981;
        }
        
        .checkbox-custom:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 14px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .slide-in {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .fade-out {
            animation: fadeOut 0.3s ease-out forwards;
        }
        
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateX(20px);
            }
        }
        
        .filter-btn.active {
            background-color: #4f46e5;
            color: white;
        }
        
        .progress-bar {
            transition: width 0.5s ease-out;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="root"></div>

    <script type="text/babel">
        const { createStore } = Redux;
        const { Provider, connect } = ReactRedux;
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // ACTION TYPES
        // ==========================================
        const ADD_TODO = 'ADD_TODO';
        const TOGGLE_TODO = 'TOGGLE_TODO';
        const REMOVE_TODO = 'REMOVE_TODO';
        const SET_FILTER = 'SET_FILTER';
        const CLEAR_COMPLETED = 'CLEAR_COMPLETED';
        const EDIT_TODO = 'EDIT_TODO';

        // ==========================================
        // ACTION CREATORS
        // ==========================================
        const addTodo = (text) => ({
            type: ADD_TODO,
            payload: {
                id: Date.now() + Math.random(),
                text,
                completed: false,
                createdAt: new Date().toISOString()
            }
        });

        const toggleTodo = (id) => ({
            type: TOGGLE_TODO,
            payload: id
        });

        const removeTodo = (id) => ({
            type: REMOVE_TODO,
            payload: id
        });

        const setFilter = (filter) => ({
            type: SET_FILTER,
            payload: filter
        });

        const clearCompleted = () => ({
            type: CLEAR_COMPLETED
        });

        const editTodo = (id, text) => ({
            type: EDIT_TODO,
            payload: { id, text }
        });

        // ==========================================
        // INITIAL STATE
        // ==========================================
        const initialState = {
            todos: [
                { id: 1, text: 'Learn React basics', completed: true, createdAt: new Date().toISOString() },
                { id: 2, text: 'Understand Redux state management', completed: false, createdAt: new Date().toISOString() },
                { id: 3, text: 'Build a Todo List app', completed: false, createdAt: new Date().toISOString() }
            ],
            filter: 'ALL' // ALL, ACTIVE, COMPLETED
        };

        // ==========================================
        // REDUCER
        // ==========================================
        const todoReducer = (state = initialState, action) => {
            switch (action.type) {
                case ADD_TODO:
                    return {
                        ...state,
                        todos: [action.payload, ...state.todos]
                    };

                case TOGGLE_TODO:
                    return {
                        ...state,
                        todos: state.todos.map(todo =>
                            todo.id === action.payload
                                ? { ...todo, completed: !todo.completed }
                                : todo
                        )
                    };

                case REMOVE_TODO:
                    return {
                        ...state,
                        todos: state.todos.filter(todo => todo.id !== action.payload)
                    };

                case SET_FILTER:
                    return {
                        ...state,
                        filter: action.payload
                    };

                case CLEAR_COMPLETED:
                    return {
                        ...state,
                        todos: state.todos.filter(todo => !todo.completed)
                    };

                case EDIT_TODO:
                    return {
                        ...state,
                        todos: state.todos.map(todo =>
                            todo.id === action.payload.id
                                ? { ...todo, text: action.payload.text }
                                : todo
                        )
                    };

                default:
                    return state;
            }
        };

        // ==========================================
        // STORE
        // ==========================================
        const store = createStore(
            todoReducer,
            window.__REDUX_DEVTOOLS_EXTENSION__ && window.__REDUX_DEVTOOLS_EXTENSION__()
        );

        // ==========================================
        // COMPONENTS
        // ==========================================

        // Progress Bar Component
        const ProgressBar = ({ todos }) => {
            const completedCount = todos.filter(t => t.completed).length;
            const total = todos.length;
            const percentage = total === 0 ? 0 : Math.round((completedCount / total) * 100);

            return (
                <div className="mb-6">
                    <div className="flex justify-between text-sm text-gray-600 mb-2">
                        <span className="font-medium">Progress</span>
                        <span className="font-bold text-indigo-600">{percentage}%</span>
                    </div>
                    <div className="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                        <div 
                            className="progress-bar bg-gradient-to-r from-indigo-500 to-purple-500 h-full rounded-full"
                            style={{ width: `${percentage}%` }}
                        ></div>
                    </div>
                    <p className="text-xs text-gray-500 mt-1">
                        {completedCount} of {total} tasks completed
                    </p>
                </div>
            );
        };

        // Add Todo Component
        const AddTodo = ({ addTodo }) => {
            const [text, setText] = useState('');
            const inputRef = useRef(null);

            const handleSubmit = (e) => {
                e.preventDefault();
                const trimmed = text.trim();
                if (trimmed) {
                    addTodo(trimmed);
                    setText('');
                    inputRef.current.focus();
                }
            };

            return (
                <form onSubmit={handleSubmit} className="mb-6">
                    <div className="relative flex items-center">
                        <input
                            ref={inputRef}
                            type="text"
                            value={text}
                            onChange={(e) => setText(e.target.value)}
                            placeholder="What needs to be done?"
                            className="w-full pl-5 pr-14 py-4 bg-white border-2 border-gray-200 rounded-2xl focus:border-indigo-500 focus:outline-none text-gray-700 placeholder-gray-400 shadow-sm transition-all"
                        />
                        <button
                            type="submit"
                            disabled={!text.trim()}
                            className="absolute right-2 p-2 bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-300 text-white rounded-xl transition-colors shadow-md"
                        >
                            <i className="fas fa-plus text-lg"></i>
                        </button>
                    </div>
                </form>
            );
        };

        // Todo Item Component
        const TodoItem = ({ todo, toggleTodo, removeTodo, editTodo }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [editText, setEditText] = useState(todo.text);
            const [isRemoving, setIsRemoving] = useState(false);
            const editRef = useRef(null);

            useEffect(() => {
                if (isEditing && editRef.current) {
                    editRef.current.focus();
                    editRef.current.select();
                }
            }, [isEditing]);

            const handleRemove = () => {
                setIsRemoving(true);
                setTimeout(() => removeTodo(todo.id), 300);
            };

            const handleEdit = () => {
                if (editText.trim() && editText !== todo.text) {
                    editTodo(todo.id, editText.trim());
                }
                setIsEditing(false);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') handleEdit();
                if (e.key === 'Escape') {
                    setEditText(todo.text);
                    setIsEditing(false);
                }
            };

            const formatDate = (dateString) => {
                const date = new Date(dateString);
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            };

            return (
                <div className={`todo-item slide-in flex items-center gap-3 p-4 bg-white rounded-xl shadow-sm border border-gray-100 mb-3 ${todo.completed ? 'completed bg-gray-50' : ''} ${isRemoving ? 'fade-out' : ''}`}>
                    <input
                        type="checkbox"
                        checked={todo.completed}
                        onChange={() => toggleTodo(todo.id)}
                        className="checkbox-custom flex-shrink-0"
                    />
                    
                    <div className="flex-1 min-w-0">
                        {isEditing ? (
                            <input
                                ref={editRef}
                                type="text"
                                value={editText}
                                onChange={(e) => setEditText(e.target.value)}
                                onBlur={handleEdit}
                                onKeyDown={handleKeyDown}
                                className="w-full px-2 py-1 border-2 border-indigo-300 rounded-lg focus:outline-none text-gray-700"
                            />
                        ) : (
                            <div className="flex flex-col">
                                <span 
                                    className="todo-text text-gray-800 font-medium cursor-pointer select-none truncate"
                                    onDoubleClick={() => !todo.completed && setIsEditing(true)}
                                    title="Double-click to edit"
                                >
                                    {todo.text}
                                </span>
                                <span className="text-xs text-gray-400 mt-0.5">
                                    {formatDate(todo.createdAt)}
                                </span>
                            </div>
                        )}
                    </div>

                    <div className="flex items-center gap-1 flex-shrink-0">
                        {!todo.completed && !isEditing && (
                            <button
                                onClick={() => setIsEditing(true)}
                                className="p-2 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all"
                                title="Edit"
                            >
                                <i className="fas fa-pen text-sm"></i>
                            </button>
                        )}
                        <button
                            onClick={handleRemove}
                            className="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all"
                            title="Delete"
                        >
                            <i className="fas fa-trash-alt text-sm"></i>
                        </button>
                    </div>
                </div>
            );
        };

        // Filter Tabs Component
        const FilterTabs = ({ currentFilter, setFilter, counts }) => {
            const filters = [
                { key: 'ALL', label: 'All', count: counts.all },
                { key: 'ACTIVE', label: 'Active', count: counts.active },
                { key: 'COMPLETED', label: 'Completed', count: counts.completed }
            ];

            return (
                <div className="flex gap-2 mb-6 p-1 bg-gray-100 rounded-xl">
                    {filters.map(filter => (
                        <button
                            key={filter.key}
                            onClick={() => setFilter(filter.key)}
                            className={`filter-btn flex-1 py-2 px-4 rounded-lg text-sm font-medium transition-all ${currentFilter === filter.key ? 'active shadow-sm' : 'text-gray-600 hover:text-gray-900'}`}
                        >
                            {filter.label}
                            <span className={`ml-2 text-xs px-2 py-0.5 rounded-full ${currentFilter === filter.key ? 'bg-white/30' : 'bg-gray-200 text-gray-500'}`}>
                                {filter.count}
                            </span>
                        </button>
                    ))}
                </div>
            );
        };

        // Stats Component
        const Stats = ({ todos, clearCompleted }) => {
            const completedCount = todos.filter(t => t.completed).length;
            const hasCompleted = completedCount > 0;

            return (
                <div className="flex items-center justify-between mt-6 pt-6 border-t border-gray-200">
                    <p className="text-sm text-gray-500">
                        <span className="font-semibold text-gray-700">{todos.filter(t => !t.completed).length}</span> items left
                    </p>
                    {hasCompleted && (
                        <button
                            onClick={clearCompleted}
                            className="text-sm text-red-500 hover:text-red-700 hover:bg-red-50 px-3 py-1.5 rounded-lg transition-all font-medium"
                        >
                            <i className="fas fa-broom mr-1"></i>
                            Clear completed
                        </button>
                    )}
                </div>
            );
        };

        // Empty State Component
        const EmptyState = ({ filter }) => {
            const messages = {
                ALL: { icon: 'fa-clipboard-list', text: 'No todos yet', sub: 'Add a new task above to get started!' },
                ACTIVE: { icon: 'fa-check-circle', text: 'No active tasks', sub: 'Great job! All tasks are completed.' },
                COMPLETED: { icon: 'fa-trophy', text: 'No completed tasks', sub: 'Finish some tasks to see them here.' }
            };

            const msg = messages[filter];

            return (
                <div className="text-center py-12">
                    <div className="w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i className={`fas ${msg.icon} text-2xl text-indigo-400`}></i>
                    </div>
                    <h3 className="text-lg font-semibold text-gray-700 mb-1">{msg.text}</h3>
                    <p className="text-sm text-gray-500">{msg.sub}</p>
                </div>
            );
        };

        // Main Todo App Component
        const TodoApp = ({ todos, filter, addTodo, toggleTodo, removeTodo, setFilter, clearCompleted, editTodo }) => {
            const filteredTodos = todos.filter(todo => {
                if (filter === 'ACTIVE') return !todo.completed;
                if (filter === 'COMPLETED') return todo.completed;
                return true;
            });

            const counts = {
                all: todos.length,
                active: todos.filter(t => !t.completed).length,
                completed: todos.filter(t => t.completed).length
            };

            return (
                <div className="max-w-2xl mx-auto">
                    {/* Header */}
                    <div className="text-center mb-8">
                        <h1 className="text-4xl font-bold text-white mb-2 drop-shadow-md">
                            <i className="fas fa-tasks mr-3"></i>
                            Todo List
                        </h1>
                        <p className="text-indigo-100 text-lg">Manage your tasks efficiently</p>
                    </div>

                    {/* Main Card */}
                    <div className="bg-white/95 backdrop-blur-sm rounded-3xl shadow-2xl p-6 md:p-8">
                        <ProgressBar todos={todos} />
                        <AddTodo addTodo={addTodo} />
                        <FilterTabs 
                            currentFilter={filter} 
                            setFilter={setFilter} 
                            counts={counts} 
                        />

                        {/* Todo List */}
                        <div className="space-y-1 min-h-[200px]">
                            {filteredTodos.length === 0 ? (
                                <EmptyState filter={filter} />
                            ) : (
                                filteredTodos.map(todo => (
                                    <TodoItem
                                        key={todo.id}
                                        todo={todo}
                                        toggleTodo={toggleTodo}
                                        removeTodo={removeTodo}
                                        editTodo={editTodo}
                                    />
                                ))
                            )}
                        </div>

                        <Stats todos={todos} clearCompleted={clearCompleted} />
                    </div>

                    {/* Footer */}
                    <div className="text-center mt-6 text-white/70 text-sm">
                        <p>Double-click a task to edit • Built with React & Redux</p>
                    </div>
                </div>
            );
        };

        // ==========================================
        // CONNECT TO REDUX
        // ==========================================
        const mapStateToProps = (state) => ({
            todos: state.todos,
            filter: state.filter
        });

        const mapDispatchToProps = {
            addTodo,
            toggleTodo,
            removeTodo,
            setFilter,
            clearCompleted,
            editTodo
        };

        const ConnectedTodoApp = connect(mapStateToProps, mapDispatchToProps)(TodoApp);

        // ==========================================
        // RENDER
        // ==========================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <Provider store={store}>
                <ConnectedTodoApp />
            </Provider>
        );
    </script>
</body>
</html>
