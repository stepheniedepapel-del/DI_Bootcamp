<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React-Redux Todo List with Categories</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Redux & React-Redux -->
    <script src="https://unpkg.com/redux@4.2.1/dist/redux.min.js"></script>
    <script src="https://unpkg.com/react-redux@8.1.3/dist/react-redux.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4338ca 100%);
            min-height: 100vh;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }
        
        .category-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .category-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .todo-item {
            transition: all 0.25s ease;
        }
        
        .todo-item:hover {
            background-color: #f8fafc;
            transform: translateX(4px);
        }
        
        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #94a3b8;
        }
        
        .checkbox-custom {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        
        .checkbox-custom:checked {
            background-color: #10b981;
            border-color: #10b981;
        }
        
        .checkbox-custom:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 12px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
        }
        
        .slide-in {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-out {
            animation: fadeOut 0.3s ease-out forwards;
        }
        
        @keyframes fadeOut {
            to { opacity: 0; transform: translateX(30px); height: 0; margin: 0; padding: 0; }
        }
        
        .scale-in {
            animation: scaleIn 0.3s ease-out;
        }
        
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .category-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .progress-ring {
            transition: stroke-dashoffset 0.5s ease;
        }
        
        .tab-btn {
            position: relative;
            transition: all 0.2s;
        }
        
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: #4f46e5;
            border-radius: 2px;
        }
        
        .color-picker-option {
            transition: transform 0.2s;
        }
        
        .color-picker-option:hover {
            transform: scale(1.2);
        }
        
        .color-picker-option.selected {
            transform: scale(1.3);
            box-shadow: 0 0 0 3px white, 0 0 0 5px currentColor;
        }
        
        .empty-illustration {
            opacity: 0.5;
        }
    </style>
</head>
<body class="p-4 md:p-6">

    <div id="root"></div>

    <script type="text/babel">
        const { createStore } = Redux;
        const { Provider, connect } = ReactRedux;
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // CONSTANTS
        // ==========================================
        const CATEGORY_COLORS = {
            blue:   { bg: 'bg-blue-500',   light: 'bg-blue-50',   text: 'text-blue-600',   border: 'border-blue-200',   ring: '#3b82f6' },
            green:  { bg: 'bg-green-500',  light: 'bg-green-50',  text: 'text-green-600',  border: 'border-green-200',  ring: '#10b981' },
            purple: { bg: 'bg-purple-500', light: 'bg-purple-50', text: 'text-purple-600', border: 'border-purple-200', ring: '#8b5cf6' },
            orange: { bg: 'bg-orange-500',light: 'bg-orange-50', text: 'text-orange-600', border: 'border-orange-200', ring: '#f97316' },
            pink:   { bg: 'bg-pink-500',   light: 'bg-pink-50',   text: 'text-pink-600',   border: 'border-pink-200',   ring: '#ec4899' },
            teal:   { bg: 'bg-teal-500',   light: 'bg-teal-50',   text: 'text-teal-600',   border: 'border-teal-200',   ring: '#14b8a6' },
            red:    { bg: 'bg-red-500',    light: 'bg-red-50',    text: 'text-red-600',    border: 'border-red-200',    ring: '#ef4444' },
            indigo: { bg: 'bg-indigo-500', light: 'bg-indigo-50', text: 'text-indigo-600', border: 'border-indigo-200', ring: '#6366f1' }
        };

        // ==========================================
        // ACTION TYPES
        // ==========================================
        // Todo Actions
        const ADD_TODO = 'ADD_TODO';
        const TOGGLE_TODO = 'TOGGLE_TODO';
        const REMOVE_TODO = 'REMOVE_TODO';
        const EDIT_TODO = 'EDIT_TODO';
        const MOVE_TODO = 'MOVE_TODO';
        const CLEAR_COMPLETED_IN_CATEGORY = 'CLEAR_COMPLETED_IN_CATEGORY';
        
        // Category Actions
        const ADD_CATEGORY = 'ADD_CATEGORY';
        const REMOVE_CATEGORY = 'REMOVE_CATEGORY';
        const EDIT_CATEGORY = 'EDIT_CATEGORY';
        
        // Filter Actions
        const SET_CATEGORY_FILTER = 'SET_CATEGORY_FILTER';
        const SET_STATUS_FILTER = 'SET_STATUS_FILTER';

        // ==========================================
        // ACTION CREATORS
        // ==========================================
        const addTodo = (text, categoryId) => ({
            type: ADD_TODO,
            payload: {
                id: Date.now() + Math.random(),
                text,
                categoryId,
                completed: false,
                createdAt: new Date().toISOString()
            }
        });

        const toggleTodo = (todoId, categoryId) => ({
            type: TOGGLE_TODO,
            payload: { todoId, categoryId }
        });

        const removeTodo = (todoId, categoryId) => ({
            type: REMOVE_TODO,
            payload: { todoId, categoryId }
        });

        const editTodo = (todoId, categoryId, text) => ({
            type: EDIT_TODO,
            payload: { todoId, categoryId, text }
        });

        const moveTodo = (todoId, fromCategoryId, toCategoryId) => ({
            type: MOVE_TODO,
            payload: { todoId, fromCategoryId, toCategoryId }
        });

        const clearCompletedInCategory = (categoryId) => ({
            type: CLEAR_COMPLETED_IN_CATEGORY,
            payload: categoryId
        });

        const addCategory = (name, color) => ({
            type: ADD_CATEGORY,
            payload: {
                id: Date.now() + Math.random(),
                name,
                color,
                createdAt: new Date().toISOString()
            }
        });

        const removeCategory = (categoryId) => ({
            type: REMOVE_CATEGORY,
            payload: categoryId
        });

        const editCategory = (categoryId, name, color) => ({
            type: EDIT_CATEGORY,
            payload: { categoryId, name, color }
        });

        const setCategoryFilter = (filter) => ({
            type: SET_CATEGORY_FILTER,
            payload: filter
        });

        const setStatusFilter = (filter) => ({
            type: SET_STATUS_FILTER,
            payload: filter
        });

        // ==========================================
        // INITIAL STATE
        // ==========================================
        const initialState = {
            categories: [
                { id: 'cat-1', name: 'Work', color: 'blue', createdAt: new Date().toISOString() },
                { id: 'cat-2', name: 'Personal', color: 'green', createdAt: new Date().toISOString() },
                { id: 'cat-3', name: 'Shopping', color: 'purple', createdAt: new Date().toISOString() }
            ],
            todos: [
                { id: 'todo-1', text: 'Complete project documentation', categoryId: 'cat-1', completed: false, createdAt: new Date().toISOString() },
                { id: 'todo-2', text: 'Review pull requests', categoryId: 'cat-1', completed: true, createdAt: new Date().toISOString() },
                { id: 'todo-3', text: 'Team meeting at 2 PM', categoryId: 'cat-1', completed: false, createdAt: new Date().toISOString() },
                { id: 'todo-4', text: 'Morning jog', categoryId: 'cat-2', completed: true, createdAt: new Date().toISOString() },
                { id: 'todo-5', text: 'Call mom', categoryId: 'cat-2', completed: false, createdAt: new Date().toISOString() },
                { id: 'todo-6', text: 'Buy groceries', categoryId: 'cat-3', completed: false, createdAt: new Date().toISOString() },
                { id: 'todo-7', text: 'Get new headphones', categoryId: 'cat-3', completed: true, createdAt: new Date().toISOString() }
            ],
            filters: {
                category: 'ALL',      // ALL or specific categoryId
                status: 'ALL'         // ALL, ACTIVE, COMPLETED
            }
        };

        // ==========================================
        // REDUCER
        // ==========================================
        const appReducer = (state = initialState, action) => {
            switch (action.type) {
                // --- Todo Actions ---
                case ADD_TODO:
                    // Validate category exists
                    const catExists = state.categories.find(c => c.id === action.payload.categoryId);
                    if (!catExists) return state;
                    return {
                        ...state,
                        todos: [action.payload, ...state.todos]
                    };

                case TOGGLE_TODO:
                    return {
                        ...state,
                        todos: state.todos.map(todo =>
                            todo.id === action.payload.todoId && todo.categoryId === action.payload.categoryId
                                ? { ...todo, completed: !todo.completed }
                                : todo
                        )
                    };

                case REMOVE_TODO:
                    return {
                        ...state,
                        todos: state.todos.filter(todo => 
                            !(todo.id === action.payload.todoId && todo.categoryId === action.payload.categoryId)
                        )
                    };

                case EDIT_TODO:
                    return {
                        ...state,
                        todos: state.todos.map(todo =>
                            todo.id === action.payload.todoId && todo.categoryId === action.payload.categoryId
                                ? { ...todo, text: action.payload.text }
                                : todo
                        )
                    };

                case MOVE_TODO:
                    const targetCatExists = state.categories.find(c => c.id === action.payload.toCategoryId);
                    if (!targetCatExists) return state;
                    return {
                        ...state,
                        todos: state.todos.map(todo =>
                            todo.id === action.payload.todoId && todo.categoryId === action.payload.fromCategoryId
                                ? { ...todo, categoryId: action.payload.toCategoryId }
                                : todo
                        )
                    };

                case CLEAR_COMPLETED_IN_CATEGORY:
                    return {
                        ...state,
                        todos: state.todos.filter(todo => 
                            !(todo.categoryId === action.payload && todo.completed)
                        )
                    };

                // --- Category Actions ---
                case ADD_CATEGORY:
                    // Prevent duplicate names
                    const nameExists = state.categories.find(c => 
                        c.name.toLowerCase() === action.payload.name.toLowerCase()
                    );
                    if (nameExists) return state;
                    return {
                        ...state,
                        categories: [...state.categories, action.payload]
                    };

                case REMOVE_CATEGORY:
                    // Don't remove if it's the last category
                    if (state.categories.length <= 1) return state;
                    return {
                        ...state,
                        categories: state.categories.filter(c => c.id !== action.payload),
                        todos: state.todos.filter(t => t.categoryId !== action.payload)
                    };

                case EDIT_CATEGORY:
                    const editNameExists = state.categories.find(c => 
                        c.id !== action.payload.categoryId && 
                        c.name.toLowerCase() === action.payload.name.toLowerCase()
                    );
                    if (editNameExists) return state;
                    return {
                        ...state,
                        categories: state.categories.map(c =>
                            c.id === action.payload.categoryId
                                ? { ...c, name: action.payload.name, color: action.payload.color }
                                : c
                        )
                    };

                // --- Filter Actions ---
                case SET_CATEGORY_FILTER:
                    return {
                        ...state,
                        filters: { ...state.filters, category: action.payload }
                    };

                case SET_STATUS_FILTER:
                    return {
                        ...state,
                        filters: { ...state.filters, status: action.payload }
                    };

                default:
                    return state;
            }
        };

        // ==========================================
        // STORE
        // ==========================================
        const store = createStore(
            appReducer,
            window.__REDUX_DEVTOOLS_EXTENSION__ && window.__REDUX_DEVTOOLS_EXTENSION__()
        );

        // ==========================================
        // UTILITY COMPONENTS
        // ==========================================

        const CircularProgress = ({ percentage, color, size = 40 }) => {
            const radius = (size - 8) / 2;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (percentage / 100) * circumference;

            return (
                <div className="relative inline-flex items-center justify-center" style={{ width: size, height: size }}>
                    <svg className="transform -rotate-90" width={size} height={size}>
                        <circle
                            cx={size / 2} cy={size / 2} r={radius}
                            fill="none" stroke="#e2e8f0" strokeWidth="3"
                        />
                        <circle
                            cx={size / 2} cy={size / 2} r={radius}
                            fill="none" stroke={color} strokeWidth="3"
                            strokeDasharray={circumference}
                            strokeDashoffset={offset}
                            strokeLinecap="round"
                            className="progress-ring"
                        />
                    </svg>
                    <span className="absolute text-xs font-bold text-gray-600">{percentage}%</span>
                </div>
            );
        };

        // ==========================================
        // MAIN COMPONENTS
        // ==========================================

        // --- Category Manager Modal ---
        const CategoryManager = ({ categories, addCategory, removeCategory, editCategory, onClose }) => {
            const [newName, setNewName] = useState('');
            const [newColor, setNewColor] = useState('blue');
            const [editingId, setEditingId] = useState(null);
            const [editName, setEditName] = useState('');
            const [editColor, setEditColor] = useState('');
            const [error, setError] = useState('');

            const handleAdd = (e) => {
                e.preventDefault();
                if (!newName.trim()) {
                    setError('Category name is required');
                    return;
                }
                if (categories.length >= 8) {
                    setError('Maximum 8 categories allowed');
                    return;
                }
                addCategory(newName.trim(), newColor);
                setNewName('');
                setError('');
            };

            const startEdit = (cat) => {
                setEditingId(cat.id);
                setEditName(cat.name);
                setEditColor(cat.color);
                setError('');
            };

            const saveEdit = () => {
                if (!editName.trim()) {
                    setError('Category name cannot be empty');
                    return;
                }
                editCategory(editingId, editName.trim(), editColor);
                setEditingId(null);
                setError('');
            };

            return (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={onClose}>
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[90vh] overflow-y-auto scale-in" onClick={e => e.stopPropagation()}>
                        <div className="p-6 border-b border-gray-100 flex justify-between items-center">
                            <h2 className="text-xl font-bold text-gray-800">Manage Categories</h2>
                            <button onClick={onClose} className="p-2 hover:bg-gray-100 rounded-lg transition-colors">
                                <i className="fas fa-times text-gray-500"></i>
                            </button>
                        </div>

                        <div className="p-6">
                            {/* Add New Category */}
                            <form onSubmit={handleAdd} className="mb-6">
                                <label className="block text-sm font-semibold text-gray-700 mb-2">Add New Category</label>
                                <div className="flex gap-2 mb-3">
                                    <input
                                        type="text"
                                        value={newName}
                                        onChange={(e) => { setNewName(e.target.value); setError(''); }}
                                        placeholder="Category name..."
                                        className="flex-1 px-4 py-2 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:outline-none text-sm"
                                        maxLength={20}
                                    />
                                    <button
                                        type="submit"
                                        className="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-medium transition-colors"
                                    >
                                        <i className="fas fa-plus mr-1"></i> Add
                                    </button>
                                </div>
                                
                                <div className="flex gap-2 flex-wrap">
                                    {Object.keys(CATEGORY_COLORS).map(color => (
                                        <button
                                            key={color}
                                            type="button"
                                            onClick={() => setNewColor(color)}
                                            className={`color-picker-option w-8 h-8 rounded-full ${CATEGORY_COLORS[color].bg} ${newColor === color ? 'selected' : ''}`}
                                            style={{ color: CATEGORY_COLORS[color].ring }}
                                            title={color}
                                        />
                                    ))}
                                </div>
                                {error && <p className="text-red-500 text-xs mt-2">{error}</p>}
                            </form>

                            {/* Existing Categories */}
                            <div className="space-y-2">
                                <label className="block text-sm font-semibold text-gray-700 mb-2">Existing Categories</label>
                                {categories.map(cat => {
                                    const color = CATEGORY_COLORS[cat.color] || CATEGORY_COLORS.blue;
                                    return (
                                        <div key={cat.id} className="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
                                            <div className={`w-4 h-4 rounded-full ${color.bg} flex-shrink-0`}></div>
                                            
                                            {editingId === cat.id ? (
                                                <div className="flex-1 flex items-center gap-2">
                                                    <input
                                                        type="text"
                                                        value={editName}
                                                        onChange={(e) => setEditName(e.target.value)}
                                                        className="flex-1 px-2 py-1 border border-gray-300 rounded-lg text-sm"
                                                        autoFocus
                                                        onKeyDown={(e) => {
                                                            if (e.key === 'Enter') saveEdit();
                                                            if (e.key === 'Escape') setEditingId(null);
                                                        }}
                                                    />
                                                    <div className="flex gap-1">
                                                        {Object.keys(CATEGORY_COLORS).map(c => (
                                                            <button
                                                                key={c}
                                                                onClick={() => setEditColor(c)}
                                                                className={`w-5 h-5 rounded-full ${CATEGORY_COLORS[c].bg} ${editColor === c ? 'ring-2 ring-offset-1 ring-gray-400' : ''}`}
                                                            />
                                                        ))}
                                                    </div>
                                                    <button onClick={saveEdit} className="text-green-600 p-1 hover:bg-green-50 rounded">
                                                        <i className="fas fa-check"></i>
                                                    </button>
                                                    <button onClick={() => setEditingId(null)} className="text-gray-400 p-1 hover:bg-gray-200 rounded">
                                                        <i className="fas fa-times"></i>
                                                    </button>
                                                </div>
                                            ) : (
                                                <>
                                                    <span className="flex-1 font-medium text-gray-700 text-sm">{cat.name}</span>
                                                    <button onClick={() => startEdit(cat)} className="p-1.5 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors">
                                                        <i className="fas fa-pen text-xs"></i>
                                                    </button>
                                                    <button 
                                                        onClick={() => removeCategory(cat.id)}
                                                        disabled={categories.length <= 1}
                                                        className="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors disabled:opacity-30 disabled:cursor-not-allowed"
                                                        title={categories.length <= 1 ? "Cannot delete last category" : "Delete category"}
                                                    >
                                                        <i className="fas fa-trash text-xs"></i>
                                                    </button>
                                                </>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Add Todo Form ---
        const AddTodoForm = ({ categories, addTodo }) => {
            const [text, setText] = useState('');
            const [categoryId, setCategoryId] = useState(categories[0]?.id || '');
            const inputRef = useRef(null);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (text.trim() && categoryId) {
                    addTodo(text.trim(), categoryId);
                    setText('');
                    inputRef.current?.focus();
                }
            };

            return (
                <form onSubmit={handleSubmit} className="bg-white rounded-2xl shadow-lg p-4 mb-6">
                    <div className="flex flex-col sm:flex-row gap-3">
                        <div className="flex-1 relative">
                            <input
                                ref={inputRef}
                                type="text"
                                value={text}
                                onChange={(e) => setText(e.target.value)}
                                placeholder="Add a new task..."
                                className="w-full pl-4 pr-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:outline-none focus:bg-white transition-all text-gray-700 placeholder-gray-400"
                            />
                        </div>
                        <div className="flex gap-2">
                            <select
                                value={categoryId}
                                onChange={(e) => setCategoryId(e.target.value)}
                                className="px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:outline-none text-sm font-medium text-gray-700 cursor-pointer"
                            >
                                {categories.map(cat => {
                                    const color = CATEGORY_COLORS[cat.color] || CATEGORY_COLORS.blue;
                                    return (
                                        <option key={cat.id} value={cat.id}>
                                            {cat.name}
                                        </option>
                                    );
                                })}
                            </select>
                            <button
                                type="submit"
                                disabled={!text.trim()}
                                className="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-300 text-white rounded-xl font-semibold transition-all shadow-md hover:shadow-lg disabled:shadow-none flex items-center gap-2"
                            >
                                <i className="fas fa-plus"></i>
                                <span className="hidden sm:inline">Add</span>
                            </button>
                        </div>
                    </div>
                </form>
            );
        };

        // --- Todo Item ---
        const TodoItem = ({ todo, category, categories, toggleTodo, removeTodo, editTodo, moveTodo }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [editText, setEditText] = useState(todo.text);
            const [isRemoving, setIsRemoving] = useState(false);
            const [showMoveMenu, setShowMoveMenu] = useState(false);
            const editRef = useRef(null);

            const color = CATEGORY_COLORS[category?.color] || CATEGORY_COLORS.blue;

            useEffect(() => {
                if (isEditing && editRef.current) {
                    editRef.current.focus();
                    editRef.current.select();
                }
            }, [isEditing]);

            const handleRemove = () => {
                setIsRemoving(true);
                setTimeout(() => removeTodo(todo.id, todo.categoryId), 300);
            };

            const handleEdit = () => {
                if (editText.trim() && editText !== todo.text) {
                    editTodo(todo.id, todo.categoryId, editText.trim());
                }
                setIsEditing(false);
            };

            const handleMove = (targetCatId) => {
                moveTodo(todo.id, todo.categoryId, targetCatId);
                setShowMoveMenu(false);
            };

            const formatDate = (dateString) => {
                const date = new Date(dateString);
                const now = new Date();
                const diffMs = now - date;
                const diffMins = Math.floor(diffMs / 60000);
                const diffHours = Math.floor(diffMs / 3600000);
                const diffDays = Math.floor(diffMs / 86400000);

                if (diffMins < 1) return 'Just now';
                if (diffMins < 60) return `${diffMins}m ago`;
                if (diffHours < 24) return `${diffHours}h ago`;
                if (diffDays < 7) return `${diffDays}d ago`;
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            };

            const otherCategories = categories.filter(c => c.id !== todo.categoryId);

            return (
                <div className={`todo-item slide-in flex items-center gap-3 p-3 rounded-xl border ${isRemoving ? 'fade-out' : ''} ${todo.completed ? 'completed bg-gray-50/50 border-transparent' : 'bg-white border-gray-100 shadow-sm'}`}>
                    <input
                        type="checkbox"
                        checked={todo.completed}
                        onChange={() => toggleTodo(todo.id, todo.categoryId)}
                        className="checkbox-custom"
                    />
                    
                    <div className="flex-1 min-w-0">
                        {isEditing ? (
                            <input
                                ref={editRef}
                                type="text"
                                value={editText}
                                onChange={(e) => setEditText(e.target.value)}
                                onBlur={handleEdit}
                                onKeyDown={(e) => {
                                    if (e.key === 'Enter') handleEdit();
                                    if (e.key === 'Escape') { setEditText(todo.text); setIsEditing(false); }
                                }}
                                className="w-full px-2 py-1 border-2 border-indigo-300 rounded-lg focus:outline-none text-sm"
                            />
                        ) : (
                            <div className="flex flex-col">
                                <span 
                                    className="todo-text text-gray-800 font-medium text-sm cursor-pointer select-none truncate"
                                    onDoubleClick={() => !todo.completed && setIsEditing(true)}
                                    title="Double-click to edit"
                                >
                                    {todo.text}
                                </span>
                                <div className="flex items-center gap-2 mt-0.5">
                                    <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium ${color.light} ${color.text}`}>
                                        <span className={`w-1.5 h-1.5 rounded-full ${color.bg}`}></span>
                                        {category?.name}
                                    </span>
                                    <span className="text-xs text-gray-400">{formatDate(todo.createdAt)}</span>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="flex items-center gap-0.5 flex-shrink-0 relative">
                        {/* Move Menu */}
                        {showMoveMenu && (
                            <div className="absolute right-0 bottom-full mb-2 bg-white rounded-xl shadow-xl border border-gray-200 py-1 min-w-[140px] z-10">
                                <div className="px-3 py-1.5 text-xs font-semibold text-gray-500 border-b border-gray-100">Move to...</div>
                                {otherCategories.map(c => {
                                    const cColor = CATEGORY_COLORS[c.color];
                                    return (
                                        <button
                                            key={c.id}
                                            onClick={() => handleMove(c.id)}
                                            className="w-full text-left px-3 py-2 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2"
                                        >
                                            <span className={`w-2 h-2 rounded-full ${cColor.bg}`}></span>
                                            {c.name}
                                        </button>
                                    );
                                })}
                            </div>
                        )}

                        {!isEditing && (
                            <button
                                onClick={() => setShowMoveMenu(!showMoveMenu)}
                                className="p-2 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all"
                                title="Move to category"
                            >
                                <i className="fas fa-exchange-alt text-xs"></i>
                            </button>
                        )}
                        
                        {!todo.completed && !isEditing && (
                            <button
                                onClick={() => setIsEditing(true)}
                                className="p-2 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all"
                                title="Edit"
                            >
                                <i className="fas fa-pen text-xs"></i>
                            </button>
                        )}
                        
                        <button
                            onClick={handleRemove}
                            className="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all"
                            title="Delete"
                        >
                            <i className="fas fa-trash-alt text-xs"></i>
                        </button>
                    </div>
                </div>
            );
        };

        // --- Category Card (for grouped view) ---
        const CategoryCard = ({ category, todos, categories, toggleTodo, removeTodo, editTodo, moveTodo, clearCompletedInCategory }) => {
            const [isExpanded, setIsExpanded] = useState(true);
            const color = CATEGORY_COLORS[category.color] || CATEGORY_COLORS.blue;
            
            const completedCount = todos.filter(t => t.completed).length;
            const total = todos.length;
            const percentage = total === 0 ? 0 : Math.round((completedCount / total) * 100);

            const filteredTodos = todos; // Already filtered by parent

            return (
                <div className={`category-card bg-white rounded-2xl shadow-lg overflow-hidden border-t-4 ${color.border.replace('border-', 'border-')}`} style={{ borderColor: color.ring }}>
                    <div 
                        className="p-4 flex items-center justify-between cursor-pointer hover:bg-gray-50 transition-colors"
                        onClick={() => setIsExpanded(!isExpanded)}
                    >
                        <div className="flex items-center gap-3">
                            <div className={`w-10 h-10 rounded-xl ${color.light} flex items-center justify-center`}>
                                <span className={`text-lg font-bold ${color.text}`}>
                                    {category.name.charAt(0).toUpperCase()}
                                </span>
                            </div>
                            <div>
                                <h3 className="font-bold text-gray-800">{category.name}</h3>
                                <p className="text-xs text-gray-500">{completedCount}/{total} completed</p>
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-3">
                            <CircularProgress percentage={percentage} color={color.ring} size={44} />
                            <button className="p-2 text-gray-400 hover:text-gray-600 transition-colors">
                                <i className={`fas fa-chevron-${isExpanded ? 'up' : 'down'}`}></i>
                            </button>
                        </div>
                    </div>

                    {isExpanded && (
                        <div className="px-4 pb-4">
                            {filteredTodos.length === 0 ? (
                                <div className="text-center py-6 text-gray-400 text-sm">
                                    <i className="fas fa-inbox mb-2 text-2xl opacity-50"></i>
                                    <p>No tasks in this category</p>
                                </div>
                            ) : (
                                <div className="space-y-2">
                                    {filteredTodos.map(todo => (
                                        <TodoItem
                                            key={todo.id}
                                            todo={todo}
                                            category={category}
                                            categories={categories}
                                            toggleTodo={toggleTodo}
                                            removeTodo={removeTodo}
                                            editTodo={editTodo}
                                            moveTodo={moveTodo}
                                        />
                                    ))}
                                </div>
                            )}
                            
                            {completedCount > 0 && (
                                <button
                                    onClick={() => clearCompletedInCategory(category.id)}
                                    className="mt-3 w-full py-2 text-xs text-red-500 hover:text-red-700 hover:bg-red-50 rounded-lg transition-all font-medium"
                                >
                                    <i className="fas fa-broom mr-1"></i> Clear {completedCount} completed
                                </button>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // --- Filter Bar ---
        const FilterBar = ({ categories, filters, setCategoryFilter, setStatusFilter, todoCounts }) => {
            const statusOptions = [
                { key: 'ALL', label: 'All', count: todoCounts.all },
                { key: 'ACTIVE', label: 'Active', count: todoCounts.active },
                { key: 'COMPLETED', label: 'Done', count: todoCounts.completed }
            ];

            return (
                <div className="bg-white rounded-2xl shadow-lg p-4 mb-6">
                    {/* Category Filter */}
                    <div className="mb-4">
                        <label className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 block">Category</label>
                        <div className="flex gap-2 flex-wrap">
                            <button
                                onClick={() => setCategoryFilter('ALL')}
                                className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-all ${filters.category === 'ALL' ? 'bg-indigo-600 text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}
                            >
                                All Categories
                            </button>
                            {categories.map(cat => {
                                const color = CATEGORY_COLORS[cat.color];
                                const isActive = filters.category === cat.id;
                                return (
                                    <button
                                        key={cat.id}
                                        onClick={() => setCategoryFilter(cat.id)}
                                        className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-all flex items-center gap-1.5 ${isActive ? 'text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}
                                        style={isActive ? { backgroundColor: color.ring } : {}}
                                    >
                                        <span className={`w-2 h-2 rounded-full ${isActive ? 'bg-white' : color.bg}`}></span>
                                        {cat.name}
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    {/* Status Filter */}
                    <div>
                        <label className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 block">Status</label>
                        <div className="flex gap-2">
                            {statusOptions.map(opt => (
                                <button
                                    key={opt.key}
                                    onClick={() => setStatusFilter(opt.key)}
                                    className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-all ${filters.status === opt.key ? 'bg-gray-800 text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}
                                >
                                    {opt.label}
                                    <span className={`ml-2 text-xs px-1.5 py-0.5 rounded-full ${filters.status === opt.key ? 'bg-white/20' : 'bg-gray-200 text-gray-500'}`}>
                                        {opt.count}
                                    </span>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Overall Stats ---
        const OverallStats = ({ todos, categories }) => {
            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            const active = total - completed;
            const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);

            const categoryStats = categories.map(cat => {
                const catTodos = todos.filter(t => t.categoryId === cat.id);
                const catCompleted = catTodos.filter(t => t.completed).length;
                return {
                    ...cat,
                    total: catTodos.length,
                    completed: catCompleted,
                    percentage: catTodos.length === 0 ? 0 : Math.round((catCompleted / catTodos.length) * 100)
                };
            }).sort((a, b) => b.total - a.total);

            return (
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div className="bg-gradient-to-br from-indigo-600 to-purple-700 rounded-2xl p-5 text-white shadow-lg">
                        <div className="flex items-center justify-between mb-3">
                            <span className="text-indigo-100 text-sm font-medium">Overall Progress</span>
                            <i className="fas fa-chart-pie text-indigo-200"></i>
                        </div>
                        <div className="flex items-end gap-2">
                            <span className="text-4xl font-bold">{percentage}%</span>
                            <span className="text-indigo-200 text-sm mb-1">{completed}/{total} done</span>
                        </div>
                        <div className="mt-3 w-full bg-white/20 rounded-full h-2">
                            <div className="bg-white rounded-full h-2 transition-all duration-500" style={{ width: `${percentage}%` }}></div>
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl p-5 shadow-lg">
                        <div className="flex items-center justify-between mb-3">
                            <span className="text-gray-500 text-sm font-medium">Active Tasks</span>
                            <div className="w-8 h-8 bg-orange-100 rounded-lg flex items-center justify-center">
                                <i className="fas fa-clock text-orange-600 text-sm"></i>
                            </div>
                        </div>
                        <span className="text-3xl font-bold text-gray-800">{active}</span>
                        <p className="text-xs text-gray-400 mt-1">tasks remaining</p>
                    </div>

                    <div className="bg-white rounded-2xl p-5 shadow-lg">
                        <div className="flex items-center justify-between mb-3">
                            <span className="text-gray-500 text-sm font-medium">Top Category</span>
                            <div className="w-8 h-8 bg-green-100 rounded-lg flex items-center justify-center">
                                <i className="fas fa-trophy text-green-600 text-sm"></i>
                            </div>
                        </div>
                        {categoryStats[0]?.total > 0 ? (
                            <>
                                <span className="text-3xl font-bold text-gray-800">{categoryStats[0].name}</span>
                                <p className="text-xs text-gray-400 mt-1">{categoryStats[0].total} tasks total</p>
                            </>
                        ) : (
                            <span className="text-xl font-bold text-gray-400">No data</span>
                        )}
                    </div>
                </div>
            );
        };

        // --- Empty State ---
        const EmptyState = ({ type }) => {
            const configs = {
                noTodos: { icon: 'fa-clipboard-check', title: 'All caught up!', desc: 'You have no tasks. Add one above to get started.' },
                noResults: { icon: 'fa-search', title: 'No matches found', desc: 'Try adjusting your filters to see more tasks.' },
                noCategory: { icon: 'fa-folder-open', title: 'Select a category', desc: 'Choose a category from the filters above.' }
            };
            const config = configs[type] || configs.noResults;

            return (
                <div className="text-center py-16">
                    <div className="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4 empty-illustration">
                        <i className={`fas ${config.icon} text-3xl text-gray-400`}></i>
                    </div>
                    <h3 className="text-lg font-semibold text-gray-700 mb-1">{config.title}</h3>
                    <p className="text-sm text-gray-500 max-w-xs mx-auto">{config.desc}</p>
                </div>
            );
        };

        // ==========================================
        // MAIN APP COMPONENT
        // ==========================================
        const TodoApp = ({ 
            categories, todos, filters,
            addTodo, toggleTodo, removeTodo, editTodo, moveTodo,
            addCategory, removeCategory, editCategory,
            setCategoryFilter, setStatusFilter, clearCompletedInCategory
        }) => {
            const [showCategoryManager, setShowCategoryManager] = useState(false);

            // Apply filters
            let filteredTodos = todos;
            
            if (filters.category !== 'ALL') {
                filteredTodos = filteredTodos.filter(t => t.categoryId === filters.category);
            }
            
            if (filters.status === 'ACTIVE') {
                filteredTodos = filteredTodos.filter(t => !t.completed);
            } else if (filters.status === 'COMPLETED') {
                filteredTodos = filteredTodos.filter(t => t.completed);
            }

            // Group by category for display
            const groupedTodos = categories
                .map(cat => ({
                    category: cat,
                    todos: filteredTodos.filter(t => t.categoryId === cat.id)
                }))
                .filter(group => filters.category === 'ALL' || group.category.id === filters.category);

            const todoCounts = {
                all: todos.length,
                active: todos.filter(t => !t.completed).length,
                completed: todos.filter(t => t.completed).length
            };

            return (
                <div className="max-w-4xl mx-auto pb-12">
                    {/* Header */}
                    <header className="text-center mb-8 pt-4">
                        <h1 className="text-4xl md:text-5xl font-bold text-white mb-2 drop-shadow-lg">
                            <i className="fas fa-layer-group mr-3"></i>
                            Categorized Todos
                        </h1>
                        <p className="text-indigo-200 text-lg">Organize tasks by category with Redux</p>
                    </header>

                    {/* Stats Overview */}
                    <OverallStats todos={todos} categories={categories} />

                    {/* Add Todo */}
                    <AddTodoForm categories={categories} addTodo={addTodo} />

                    {/* Filters */}
                    <FilterBar 
                        categories={categories}
                        filters={filters}
                        setCategoryFilter={setCategoryFilter}
                        setStatusFilter={setStatusFilter}
                        todoCounts={todoCounts}
                    />

                    {/* Category Manager Button */}
                    <div className="flex justify-end mb-4">
                        <button
                            onClick={() => setShowCategoryManager(true)}
                            className="px-4 py-2 bg-white/10 hover:bg-white/20 text-white rounded-xl text-sm font-medium transition-all backdrop-blur-sm border border-white/20"
                        >
                            <i className="fas fa-cog mr-2"></i>
                            Manage Categories
                        </button>
                    </div>

                    {/* Todo List */}
                    <div className="space-y-4">
                        {todos.length === 0 ? (
                            <EmptyState type="noTodos" />
                        ) : filteredTodos.length === 0 ? (
                            <EmptyState type="noResults" />
                        ) : (
                            groupedTodos.map(({ category, todos: catTodos }) => (
                                catTodos.length > 0 && (
                                    <CategoryCard
                                        key={category.id}
                                        category={category}
                                        todos={catTodos}
                                        categories={categories}
                                        toggleTodo={toggleTodo}
                                        removeTodo={removeTodo}
                                        editTodo={editTodo}
                                        moveTodo={moveTodo}
                                        clearCompletedInCategory={clearCompletedInCategory}
                                    />
                                )
                            ))
                        )}
                    </div>

                    {/* Footer */}
                    <footer className="text-center mt-8 text-white/50 text-sm">
                        <p>Double-click to edit • Use move button to change category • Built with React & Redux</p>
                    </footer>

                    {/* Category Manager Modal */}
                    {showCategoryManager && (
                        <CategoryManager
                            categories={categories}
                            addCategory={addCategory}
                            removeCategory={removeCategory}
                            editCategory={editCategory}
                            onClose={() => setShowCategoryManager(false)}
                        />
                    )}
                </div>
            );
        };

        // ==========================================
        // CONNECT TO REDUX
        // ==========================================
        const mapStateToProps = (state) => ({
            categories: state.categories,
            todos: state.todos,
            filters: state.filters
        });

        const mapDispatchToProps = {
            addTodo, toggleTodo, removeTodo, editTodo, moveTodo,
            addCategory, removeCategory, editCategory,
            setCategoryFilter, setStatusFilter, clearCompletedInCategory
        };

        const ConnectedTodoApp = connect(mapStateToProps, mapDispatchToProps)(TodoApp);

        // ==========================================
        // RENDER
        // ==========================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <Provider store={store}>
                <ConnectedTodoApp />
            </Provider>
        );
    </script>
</body>
</html>
