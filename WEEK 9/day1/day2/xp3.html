<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Inventory Management - Redux Toolkit</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Redux Toolkit (UMD) -->
    <script src="https://unpkg.com/@reduxjs/toolkit@1.9.5/dist/redux-toolkit.umd.js"></script>
    <script src="https://unpkg.com/react-redux@8.1.3/dist/react-redux.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }
        
        .product-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .product-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .quantity-btn:active {
            transform: scale(0.9);
        }
        
        .slide-in {
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-out {
            animation: fadeOut 0.3s ease-out forwards;
        }
        
        @keyframes fadeOut {
            to { opacity: 0; transform: translateX(30px); height: 0; margin: 0; padding: 0; overflow: hidden; }
        }
        
        .modal-backdrop {
            animation: backdropIn 0.2s ease-out;
        }
        
        @keyframes backdropIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .stock-low { border-left: 4px solid #ef4444; }
        .stock-medium { border-left: 4px solid #f59e0b; }
        .stock-good { border-left: 4px solid #10b981; }
        
        .stat-card {
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="p-4 md:p-6">

    <div id="root"></div>

    <script type="text/babel">
        const { Provider, useSelector, useDispatch } = ReactRedux;
        const { configureStore, createSlice } = window.RTK;
        const { useState, useEffect, useMemo } = React;

        // ==========================================
        // STEP 1: CREATE REDUX TOOLKIT SLICE
        // ==========================================
        
        const inventorySlice = createSlice({
            name: 'inventory',
            initialState: {
                products: [
                    { id: 1, name: 'Wireless Headphones', category: 'electronics', quantity: 45, price: 79.99, sku: 'ELEC-001', description: 'Bluetooth 5.0 noise cancelling headphones' },
                    { id: 2, name: 'Organic Coffee Beans', category: 'food', quantity: 8, price: 14.99, sku: 'FOOD-002', description: 'Single origin Ethiopian roast, 500g' },
                    { id: 3, name: 'Yoga Mat Premium', category: 'sports', quantity: 23, price: 34.99, sku: 'SPRT-003', description: 'Non-slip eco-friendly TPE material' },
                    { id: 4, name: 'USB-C Hub', category: 'electronics', quantity: 3, price: 49.99, sku: 'ELEC-004', description: '7-in-1 adapter with HDMI and card reader' },
                    { id: 5, name: 'Protein Powder', category: 'food', quantity: 67, price: 29.99, sku: 'FOOD-005', description: 'Whey isolate, chocolate flavor, 2kg' },
                    { id: 6, name: 'Running Shoes', category: 'sports', quantity: 12, price: 89.99, sku: 'SPRT-006', description: 'Lightweight breathable mesh upper' }
                ],
                filter: {
                    category: 'ALL',
                    search: '',
                    stockStatus: 'ALL'
                }
            },
            reducers: {
                addProduct: (state, action) => {
                    state.products.push({
                        ...action.payload,
                        id: Date.now() + Math.random(),
                        createdAt: new Date().toISOString()
                    });
                },
                
                updateQuantity: (state, action) => {
                    const { id, quantity } = action.payload;
                    const product = state.products.find(p => p.id === id);
                    if (product) {
                        product.quantity = Math.max(0, quantity);
                    }
                },
                
                removeProduct: (state, action) => {
                    state.products = state.products.filter(p => p.id !== action.payload);
                },
                
                updateProduct: (state, action) => {
                    const { id, updates } = action.payload;
                    const index = state.products.findIndex(p => p.id === id);
                    if (index !== -1) {
                        state.products[index] = { ...state.products[index], ...updates };
                    }
                },
                
                setFilter: (state, action) => {
                    state.filter = { ...state.filter, ...action.payload };
                },
                
                resetFilters: (state) => {
                    state.filter = { category: 'ALL', search: '', stockStatus: 'ALL' };
                }
            }
        });

        const { addProduct, updateQuantity, removeProduct, updateProduct, setFilter, resetFilters } = inventorySlice.actions;

        // ==========================================
        // STEP 2: CONFIGURE REDUX STORE
        // ==========================================
        
        const store = configureStore({
            reducer: {
                inventory: inventorySlice.reducer
            },
            devTools: true
        });

        // ==========================================
        // UTILITY FUNCTIONS
        // ==========================================
        
        const getStockStatus = (quantity) => {
            if (quantity === 0) return { label: 'Out of Stock', class: 'stock-low', color: 'text-red-600 bg-red-50 border-red-200', icon: 'fa-times-circle' };
            if (quantity <= 10) return { label: 'Low Stock', class: 'stock-low', color: 'text-red-600 bg-red-50 border-red-200', icon: 'fa-exclamation-triangle' };
            if (quantity <= 25) return { label: 'Medium', class: 'stock-medium', color: 'text-amber-600 bg-amber-50 border-amber-200', icon: 'fa-minus-circle' };
            return { label: 'Good', class: 'stock-good', color: 'text-emerald-600 bg-emerald-50 border-emerald-200', icon: 'fa-check-circle' };
        };

        const categories = [
            { id: 'electronics', label: 'Electronics', icon: 'fa-laptop', color: 'bg-blue-100 text-blue-700' },
            { id: 'food', label: 'Food & Beverage', icon: 'fa-utensils', color: 'bg-orange-100 text-orange-700' },
            { id: 'sports', label: 'Sports', icon: 'fa-running', color: 'bg-green-100 text-green-700' },
            { id: 'clothing', label: 'Clothing', icon: 'fa-tshirt', color: 'bg-purple-100 text-purple-700' },
            { id: 'home', label: 'Home & Garden', icon: 'fa-home', color: 'bg-teal-100 text-teal-700' }
        ];

        // ==========================================
        // COMPONENTS
        // ==========================================

        // --- Stats Dashboard ---
        const StatsDashboard = () => {
            const products = useSelector(state => state.inventory.products);
            
            const totalProducts = products.length;
            const totalValue = products.reduce((sum, p) => sum + (p.price * p.quantity), 0);
            const lowStock = products.filter(p => p.quantity <= 10 && p.quantity > 0).length;
            const outOfStock = products.filter(p => p.quantity === 0).length;
            
            const stats = [
                { label: 'Total Products', value: totalProducts, icon: 'fa-box', light: 'bg-indigo-50 text-indigo-600' },
                { label: 'Inventory Value', value: `$${totalValue.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`, icon: 'fa-dollar-sign', light: 'bg-emerald-50 text-emerald-600' },
                { label: 'Low Stock', value: lowStock, icon: 'fa-exclamation-triangle', light: 'bg-amber-50 text-amber-600' },
                { label: 'Out of Stock', value: outOfStock, icon: 'fa-times-circle', light: 'bg-red-50 text-red-600' }
            ];

            return (
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    {stats.map((stat, idx) => (
                        <div key={idx} className="stat-card bg-white rounded-2xl p-5 shadow-lg">
                            <div className="flex items-center justify-between mb-3">
                                <div className={`w-10 h-10 ${stat.light} rounded-xl flex items-center justify-center`}>
                                    <i className={`fas ${stat.icon}`}></i>
                                </div>
                            </div>
                            <p className="text-xs text-gray-500 font-medium uppercase mb-1">{stat.label}</p>
                            <p className="text-2xl font-bold text-gray-800">{stat.value}</p>
                        </div>
                    ))}
                </div>
            );
        };

        // --- Product Modal ---
        const ProductModal = ({ isOpen, onClose, product = null }) => {
            const [formData, setFormData] = useState({
                name: '',
                category: 'electronics',
                quantity: 1,
                price: 0,
                sku: '',
                description: ''
            });
            const [errors, setErrors] = useState({});
            const dispatch = useDispatch();

            useEffect(() => {
                if (product) {
                    setFormData({
                        name: product.name,
                        category: product.category,
                        quantity: product.quantity,
                        price: product.price,
                        sku: product.sku,
                        description: product.description
                    });
                } else {
                    setFormData({
                        name: '',
                        category: 'electronics',
                        quantity: 1,
                        price: 0,
                        sku: '',
                        description: ''
                    });
                }
                setErrors({});
            }, [product, isOpen]);

            if (!isOpen) return null;

            const validate = () => {
                const newErrors = {};
                if (!formData.name.trim()) newErrors.name = 'Product name is required';
                if (!formData.sku.trim()) newErrors.sku = 'SKU is required';
                if (formData.quantity < 0) newErrors.quantity = 'Quantity cannot be negative';
                if (formData.price < 0) newErrors.price = 'Price cannot be negative';
                setErrors(newErrors);
                return Object.keys(newErrors).length === 0;
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!validate()) return;

                if (product) {
                    dispatch(updateProduct({ id: product.id, updates: formData }));
                } else {
                    dispatch(addProduct(formData));
                }
                onClose();
            };

            const handleChange = (field, value) => {
                setFormData(prev => ({ ...prev, [field]: value }));
                if (errors[field]) setErrors(prev => ({ ...prev, [field]: null }));
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop" style={{ backgroundColor: 'rgba(0,0,0,0.6)' }} onClick={onClose}>
                    <div className="modal-content bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="bg-gradient-to-r from-indigo-600 to-purple-600 px-6 py-4 flex justify-between items-center">
                            <h3 className="text-lg font-bold text-white">
                                <i className={`fas ${product ? 'fa-edit' : 'fa-plus'} mr-2`}></i>
                                {product ? 'Edit Product' : 'Add New Product'}
                            </h3>
                            <button onClick={onClose} className="text-white/70 hover:text-white transition-colors">
                                <i className="fas fa-times text-lg"></i>
                            </button>
                        </div>
                        
                        <form onSubmit={handleSubmit} className="p-6 space-y-4">
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1.5">Product Name</label>
                                <input
                                    type="text"
                                    value={formData.name}
                                    onChange={(e) => handleChange('name', e.target.value)}
                                    className={`w-full px-4 py-2.5 border-2 rounded-xl focus:outline-none transition-all ${errors.name ? 'border-red-300' : 'border-gray-200 focus:border-indigo-500'}`}
                                    placeholder="Enter product name"
                                />
                                {errors.name && <p className="text-red-500 text-xs mt-1">{errors.name}</p>}
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-1.5">Category</label>
                                    <select
                                        value={formData.category}
                                        onChange={(e) => handleChange('category', e.target.value)}
                                        className="w-full px-4 py-2.5 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:outline-none bg-white"
                                    >
                                        {categories.map(cat => (
                                            <option key={cat.id} value={cat.id}>{cat.label}</option>
                                        ))}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-1.5">SKU</label>
                                    <input
                                        type="text"
                                        value={formData.sku}
                                        onChange={(e) => handleChange('sku', e.target.value)}
                                        className={`w-full px-4 py-2.5 border-2 rounded-xl focus:outline-none transition-all ${errors.sku ? 'border-red-300' : 'border-gray-200 focus:border-indigo-500'}`}
                                        placeholder="e.g. PROD-001"
                                    />
                                    {errors.sku && <p className="text-red-500 text-xs mt-1">{errors.sku}</p>}
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-1.5">Quantity</label>
                                    <input
                                        type="number"
                                        min="0"
                                        value={formData.quantity}
                                        onChange={(e) => handleChange('quantity', parseInt(e.target.value) || 0)}
                                        className={`w-full px-4 py-2.5 border-2 rounded-xl focus:outline-none transition-all ${errors.quantity ? 'border-red-300' : 'border-gray-200 focus:border-indigo-500'}`}
                                    />
                                    {errors.quantity && <p className="text-red-500 text-xs mt-1">{errors.quantity}</p>}
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-1.5">Price ($)</label>
                                    <input
                                        type="number"
                                        min="0"
                                        step="0.01"
                                        value={formData.price}
                                        onChange={(e) => handleChange('price', parseFloat(e.target.value) || 0)}
                                        className={`w-full px-4 py-2.5 border-2 rounded-xl focus:outline-none transition-all ${errors.price ? 'border-red-300' : 'border-gray-200 focus:border-indigo-500'}`}
                                    />
                                    {errors.price && <p className="text-red-500 text-xs mt-1">{errors.price}</p>}
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1.5">Description</label>
                                <textarea
                                    value={formData.description}
                                    onChange={(e) => handleChange('description', e.target.value)}
                                    rows="3"
                                    className="w-full px-4 py-2.5 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:outline-none resize-none"
                                    placeholder="Product description..."
                                ></textarea>
                            </div>

                            <div className="flex gap-3 pt-2">
                                <button
                                    type="button"
                                    onClick={onClose}
                                    className="flex-1 py-3 border-2 border-gray-200 text-gray-700 rounded-xl font-semibold hover:bg-gray-50 transition-all"
                                >
                                    Cancel
                                </button>
                                <button
                                    type="submit"
                                    className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700 transition-all shadow-lg"
                                >
                                    {product ? 'Save Changes' : 'Add Product'}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // --- Product Card ---
        const ProductCard = ({ product }) => {
            const [isRemoving, setIsRemoving] = useState(false);
            const [showEdit, setShowEdit] = useState(false);
            const dispatch = useDispatch();
            
            const stockStatus = getStockStatus(product.quantity);
            const categoryData = categories.find(c => c.id === product.category) || categories[0];

            const handleDelete = () => {
                setIsRemoving(true);
                setTimeout(() => dispatch(removeProduct(product.id)), 300);
            };

            const handleQuantityChange = (delta) => {
                dispatch(updateQuantity({ id: product.id, quantity: product.quantity + delta }));
            };

            const handleSetQuantity = (value) => {
                const num = parseInt(value) || 0;
                dispatch(updateQuantity({ id: product.id, quantity: num }));
            };

            return (
                <>
                    <div className={`product-card slide-in bg-white rounded-2xl shadow-lg p-5 mb-4 ${stockStatus.class} ${isRemoving ? 'fade-out' : ''}`}>
                        <div className="flex items-start justify-between mb-3">
                            <div className="flex items-center gap-3">
                                <div className={`w-12 h-12 ${categoryData.color} rounded-xl flex items-center justify-center text-lg`}>
                                    <i className={`fas ${categoryData.icon}`}></i>
                                </div>
                                <div>
                                    <h3 className="font-bold text-gray-800 text-lg">{product.name}</h3>
                                    <p className="text-xs text-gray-500 font-mono">{product.sku}</p>
                                </div>
                            </div>
                            <div className="flex gap-1">
                                <button
                                    onClick={() => setShowEdit(true)}
                                    className="p-2 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all"
                                    title="Edit"
                                >
                                    <i className="fas fa-pen text-sm"></i>
                                </button>
                                <button
                                    onClick={handleDelete}
                                    className="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all"
                                    title="Delete"
                                >
                                    <i className="fas fa-trash-alt text-sm"></i>
                                </button>
                            </div>
                        </div>

                        <p className="text-sm text-gray-600 mb-4 line-clamp-2">{product.description}</p>

                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold border ${stockStatus.color}`}>
                                    <i className={`fas ${stockStatus.icon}`}></i>
                                    {stockStatus.label}
                                </span>
                                <span className="text-lg font-bold text-gray-800">${product.price.toFixed(2)}</span>
                            </div>
                            
                            <div className="flex items-center gap-2">
                                <button
                                    onClick={() => handleQuantityChange(-1)}
                                    disabled={product.quantity <= 0}
                                    className="quantity-btn w-8 h-8 bg-gray-100 hover:bg-gray-200 rounded-lg flex items-center justify-center text-gray-600 disabled:opacity-30"
                                >
                                    <i className="fas fa-minus text-xs"></i>
                                </button>
                                <input
                                    type="number"
                                    min="0"
                                    value={product.quantity}
                                    onChange={(e) => handleSetQuantity(e.target.value)}
                                    className="w-14 text-center font-bold text-gray-800 bg-gray-50 rounded-lg py-1 border border-gray-200 focus:border-indigo-500 focus:outline-none text-sm"
                                />
                                <button
                                    onClick={() => handleQuantityChange(1)}
                                    className="quantity-btn w-8 h-8 bg-indigo-100 hover:bg-indigo-200 rounded-lg flex items-center justify-center text-indigo-600"
                                >
                                    <i className="fas fa-plus text-xs"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    {showEdit && (
                        <ProductModal
                            isOpen={showEdit}
                            onClose={() => setShowEdit(false)}
                            product={product}
                        />
                    )}
                </>
            );
        };

        // --- Filter Bar ---
        const FilterBar = () => {
            const filter = useSelector(state => state.inventory.filter);
            const dispatch = useDispatch();

            return (
                <div className="bg-white rounded-2xl shadow-lg p-4 mb-6">
                    <div className="flex flex-col md:flex-row gap-4">
                        <div className="flex-1">
                            <div className="relative">
                                <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                <input
                                    type="text"
                                    value={filter.search}
                                    onChange={(e) => dispatch(setFilter({ search: e.target.value }))}
                                    placeholder="Search products..."
                                    className="w-full pl-11 pr-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:outline-none transition-all"
                                />
                            </div>
                        </div>
                        
                        <div className="flex gap-2 flex-wrap">
                            <select
                                value={filter.category}
                                onChange={(e) => dispatch(setFilter({ category: e.target.value }))}
                                className="px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:outline-none text-sm font-medium text-gray-700"
                            >
                                <option value="ALL">All Categories</option>
                                {categories.map(cat => (
                                    <option key={cat.id} value={cat.id}>{cat.label}</option>
                                ))}
                            </select>
                            
                            <select
                                value={filter.stockStatus}
                                onChange={(e) => dispatch(setFilter({ stockStatus: e.target.value }))}
                                className="px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:outline-none text-sm font-medium text-gray-700"
                            >
                                <option value="ALL">All Stock</option>
                                <option value="LOW">Low Stock</option>
                                <option value="MEDIUM">Medium</option>
                                <option value="GOOD">Good</option>
                            </select>
                            
                            <button
                                onClick={() => dispatch(resetFilters())}
                                className="px-4 py-3 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-xl text-sm font-medium transition-all"
                                title="Reset filters"
                            >
                                <i className="fas fa-undo"></i>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Inventory List ---
        const InventoryList = () => {
            const { products, filter } = useSelector(state => state.inventory);

            const filteredProducts = useMemo(() => {
                return products.filter(product => {
                    const matchesSearch = !filter.search || 
                        product.name.toLowerCase().includes(filter.search.toLowerCase()) ||
                        product.sku.toLowerCase().includes(filter.search.toLowerCase()) ||
                        product.description.toLowerCase().includes(filter.search.toLowerCase());
                    
                    const matchesCategory = filter.category === 'ALL' || product.category === filter.category;
                    
                    let matchesStock = true;
                    if (filter.stockStatus === 'LOW') matchesStock = product.quantity <= 10;
                    else if (filter.stockStatus === 'MEDIUM') matchesStock = product.quantity > 10 && product.quantity <= 25;
                    else if (filter.stockStatus === 'GOOD') matchesStock = product.quantity > 25;
                    
                    return matchesSearch && matchesCategory && matchesStock;
                });
            }, [products, filter]);

            if (filteredProducts.length === 0) {
                return (
                    <div className="text-center py-16">
                        <div className="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i className="fas fa-search text-3xl text-gray-400"></i>
                        </div>
                        <h3 className="text-lg font-semibold text-gray-700 mb-1">No products found</h3>
                        <p className="text-sm text-gray-500">Try adjusting your filters or add a new product</p>
                    </div>
                );
            }

            return (
                <div>
                    <p className="text-sm text-gray-500 mb-4">
                        Showing {filteredProducts.length} of {products.length} products
                    </p>
                    {filteredProducts.map(product => (
                        <ProductCard key={product.id} product={product} />
                    ))}
                </div>
            );
        };

        // --- Main App ---
        const App = () => {
            const [showAddModal, setShowAddModal] = useState(false);

            return (
                <div className="max-w-5xl mx-auto pb-12">
                    <header className="mb-8">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div>
                                <h1 className="text-3xl md:text-4xl font-bold text-white mb-1">
                                    <i className="fas fa-warehouse text-indigo-400 mr-3"></i>
                                    Inventory Manager
                                </h1>
                                <p className="text-gray-400">Manage your store products with Redux Toolkit</p>
                            </div>
                            <button
                                onClick={() => setShowAddModal(true)}
                                className="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-semibold transition-all shadow-lg hover:shadow-xl flex items-center gap-2"
                            >
                                <i className="fas fa-plus"></i>
                                Add Product
                            </button>
                        </div>
                    </header>

                    <StatsDashboard />
                    <FilterBar />
                    <InventoryList />

                    <ProductModal
                        isOpen={showAddModal}
                        onClose={() => setShowAddModal(false)}
                    />

                    <footer className="text-center mt-12 text-gray-500 text-sm">
                        <p>Built with Redux Toolkit • useSelector & useDispatch hooks • createSlice</p>
                    </footer>
                </div>
            );
        };

        // ==========================================
        // RENDER
        // ==========================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <Provider store={store}>
                <App />
            </Provider>
        );
    </script>
</body>
</html>
